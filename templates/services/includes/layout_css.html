<style>
  /* ══════════════════════════════════════════════════════════════
   CSS LAYOUT PARTAGÉ — MODULE services
   Inclus par : list, consommables_list, categories_list, unites_list
   ══════════════════════════════════════════════════════════════ */

  @import url('https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500&display=swap');

  :root {
    --primary: #145770;
    --primary-dark: #0f4358;
    --nav-bg: #ffffff;
    --accent: #2188ab;
    --bg: #f9f9f9;
    --surface: #ffffff;
    --border: #d9d9d9;
    --text: #212529;
    --text-muted: #6c757d;
  }

  html[data-theme="dark"] {
    --bg: #181c28;
    --surface: #21283a;
    --border: #2d3550;
    --text: #c5d4e2;
    --text-muted: #6c85a0;
  }

  *,
  *::before,
  *::after {
    box-sizing: border-box;
  }

  body {
    font-family: 'Roboto', sans-serif;
    background: var(--bg) !important;
    color: var(--text);
  }

  html {
    background: var(--bg) !important;
  }

  .topbar {
    position: fixed !important;
    top: 0 !important;
    left: 0 !important;
    right: 0 !important;
    z-index: 201 !important;
  }

  .breadcrumb {
    display: none !important;
  }

  .content {
    padding: 0 !important;
    overflow-x: hidden;
  }
  .o-list-wrap { margin: 0 !important; }

  /* ── O-NAV ── */
  .o-nav {
    background: var(--nav-bg);
    display: flex;
    align-items: center;
    height: 38px;
    padding: 0 16px;
    border-bottom: 1px solid #e0e0e0;
    position: fixed;
    top: 0;
    left: 0;
    right: 0;
    z-index: 200;
  }

  .o-nav-grid {
    width: 32px;
    height: 32px;
    display: flex;
    align-items: center;
    justify-content: center;
    color: rgba(0, 0, 0, 0.45);
    font-size: 17px;
    cursor: pointer;
    border-radius: 4px;
    margin-right: 4px;
    transition: background 0.15s;
    text-decoration: none;
  }

  .o-nav-grid:hover {
    background: rgba(0, 0, 0, 0.06);
    color: var(--primary);
  }

  .o-nav-brand {
    font-size: 14px;
    font-weight: 600;
    color: var(--primary);
    padding: 0 12px 0 4px;
    margin-right: 2px;
    border-right: 1px solid rgba(0, 0, 0, 0.12);
    white-space: nowrap;
    display: flex;
    align-items: center;
    gap: 6px;
  }

  .o-nav-link {
    color: rgba(0, 0, 0, 0.58);
    text-decoration: none;
    font-size: 13px;
    padding: 0 12px;
    height: 38px;
    display: flex;
    align-items: center;
    border-bottom: 2px solid transparent;
    transition: color 0.15s, background 0.15s, border-color 0.15s;
    white-space: nowrap;
  }

  .o-nav-link:hover,
  .o-nav-link.active {
    color: var(--primary);
    background: rgba(20, 87, 112, 0.06);
    border-bottom-color: var(--primary);
  }

  html[data-theme="dark"] .o-nav {
    background: #0a1e2e;
    border-bottom-color: rgba(255, 255, 255, 0.06);
    box-shadow: none;
  }

  html[data-theme="dark"] .o-nav-grid {
    color: rgba(255, 255, 255, 0.5);
  }

  html[data-theme="dark"] .o-nav-grid:hover {
    background: rgba(255, 255, 255, 0.08);
    color: #7aaec7;
  }

  html[data-theme="dark"] .o-nav-brand {
    color: #7aaec7;
    border-right-color: rgba(255, 255, 255, 0.1);
  }

  html[data-theme="dark"] .o-nav-link {
    color: rgba(255, 255, 255, 0.6);
  }

  html[data-theme="dark"] .o-nav-link:hover,
  html[data-theme="dark"] .o-nav-link.active {
    color: #cce8f4;
    background: rgba(33, 136, 171, 0.1);
    border-bottom-color: #4a8aaa;
  }

  /* ── SUBHEADER ── */
  .o-subheader {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 6px 16px;
    display: flex;
    flex-direction: column;
    gap: 5px;
  }

  .o-subheader-row {
    display: flex;
    align-items: center;
    gap: 8px;
    flex-wrap: wrap;
  }

  .o-page-title {
    font-size: 17px;
    font-weight: 400;
    color: var(--text);
  }

  .o-page-count {
    font-size: 12px;
    color: var(--text-muted);
    font-weight: 400;
    margin-left: 3px;
  }

  html[data-theme="dark"] .o-subheader {
    background: var(--surface);
    border-bottom-color: var(--border);
  }

  /* ── BOUTON CRÉER ── */
  .o-btn-create {
    background: var(--accent);
    color: #fff;
    border: none;
    padding: 5px 14px;
    border-radius: 4px;
    font-size: 12.5px;
    font-weight: 500;
    font-family: 'Roboto', sans-serif;
    cursor: pointer;
    text-decoration: none;
    display: inline-flex;
    align-items: center;
    gap: 5px;
    letter-spacing: 0.5px;
    transition: background 0.15s;
    white-space: nowrap;
  }

  .o-btn-create:hover {
    background: var(--primary);
  }

  /* ── BARRE DE RECHERCHE ── */
  .o-search-bar {
    display: flex;
    align-items: center;
    border: none;
    border-bottom: 1px solid #bbb;
    background: transparent;
    min-height: 28px;
    padding: 2px 4px;
    gap: 4px;
    width: 280px;
  }

  .o-search-input {
    border: none;
    outline: none;
    font-size: 12px;
    font-family: 'Roboto', sans-serif;
    color: var(--text);
    flex: 1;
    min-width: 60px;
    background: transparent;
  }

  .o-search-btn {
    background: none;
    border: none;
    cursor: pointer;
    color: var(--text-muted);
    font-size: 13px;
    padding: 2px;
  }

  html[data-theme="dark"] .o-search-input {
    color: var(--text);
  }

  html[data-theme="dark"] .o-search-bar {
    border-bottom-color: #3a4a62;
  }

  /* ── BOUTONS CONTRÔLE ── */
  .o-ctrl-btn {
    background: none;
    border: 1px solid transparent;
    border-radius: 4px;
    padding: 4px 8px;
    font-size: 12px;
    font-family: 'Roboto', sans-serif;
    color: var(--text-muted);
    cursor: pointer;
    display: flex;
    align-items: center;
    gap: 4px;
    transition: border-color 0.15s, color 0.15s, background 0.15s;
    white-space: nowrap;
    text-decoration: none;
  }

  .o-ctrl-btn:hover {
    border-color: var(--border);
    color: var(--text);
    background: #f3f3f3;
  }

  .o-ctrl-btn.active {
    border-color: #aaa;
    color: var(--text);
    background: #efefef;
  }

  html[data-theme="dark"] .o-ctrl-btn {
    color: var(--text-muted);
  }

  html[data-theme="dark"] .o-ctrl-btn:hover {
    background: #28304a;
    color: var(--text);
    border-color: var(--border);
  }

  .o-ctrl-sep {
    width: 1px;
    height: 18px;
    background: var(--border);
    margin: 0 3px;
    flex-shrink: 0;
  }

  html[data-theme="dark"] .o-ctrl-sep {
    background: var(--border);
  }

  /* ── TAGS FILTRES ── */
  .o-filter-tag {
    display: inline-flex;
    align-items: center;
    gap: 3px;
    background: #e6f2f5;
    color: var(--primary);
    border: 1px solid #b5d5de;
    border-radius: 3px;
    padding: 1px 6px;
    font-size: 11.5px;
    font-weight: 500;
    white-space: nowrap;
  }

  .o-filter-tag a {
    color: #888;
    text-decoration: none;
    font-size: 14px;
    line-height: 1;
    margin-left: 2px;
  }

  .o-filter-tag a:hover {
    color: #333;
  }

  /* ── BOUTONS VUE ── */
  .o-view-btns {
    display: flex;
    border: 1px solid var(--border);
    border-radius: 3px;
    overflow: hidden;
  }

  .o-view-btn {
    width: 26px;
    height: 24px;
    border: none;
    background: var(--surface);
    display: flex;
    align-items: center;
    justify-content: center;
    color: var(--text-muted);
    font-size: 13px;
    cursor: pointer;
    transition: background 0.15s, color 0.15s;
  }

  .o-view-btn:not(:last-child) {
    border-right: 1px solid var(--border);
  }

  .o-view-btn.active,
  .o-view-btn:hover {
    background: var(--primary);
    color: #fff;
  }

  html[data-theme="dark"] .o-view-btns {
    border-color: var(--border);
  }

  html[data-theme="dark"] .o-view-btn {
    background: var(--surface);
    color: var(--text-muted);
  }

  /* ── PAGINATION BAS ── */
  .o-pagination-bottom {
    display: flex;
    align-items: center;
    gap: 6px;
    justify-content: center;
    padding: 14px 0;
    border-top: 1px solid var(--border);
    font-size: 12px;
    color: var(--text-muted);
  }

  .o-pag-btn {
    width: 24px;
    height: 24px;
    border: 1px solid var(--border);
    border-radius: 3px;
    background: var(--surface);
    display: flex;
    align-items: center;
    justify-content: center;
    color: var(--text-muted);
    text-decoration: none;
    font-size: 12px;
    cursor: pointer;
    transition: background 0.15s, color 0.15s;
  }

  .o-pag-btn:hover {
    background: var(--primary);
    color: #fff;
    border-color: var(--primary);
  }

  .o-pag-btn.disabled {
    opacity: 0.35;
    pointer-events: none;
  }

  html[data-theme="dark"] .o-pag-btn {
    background: var(--surface);
    border-color: var(--border);
    color: var(--text-muted);
  }

  /* ── VIDE ── */
  .o-empty {
    text-align: center;
    padding: 60px 20px;
    color: var(--text-muted);
    font-size: 13px;
  }

  .o-empty i {
    font-size: 36px;
    display: block;
    margin-bottom: 10px;
    opacity: 0.5;
  }

  /* ── TRI + REDIMENSIONNEMENT COLONNES (partagé) ── */
  .o-list-table th {
    position: relative;
    user-select: none;
  }

  .sortable {
    cursor: pointer;
  }

  .sortable:hover {
    background: rgba(0, 0, 0, 0.025) !important;
  }

  html[data-theme="dark"] .sortable:hover {
    background: rgba(255, 255, 255, 0.04) !important;
  }

  .sort-icon {
    font-size: 10px;
    color: var(--accent);
    margin-left: 4px;
    vertical-align: middle;
    opacity: 0.85;
  }

  .col-resizer {
    position: absolute;
    right: 0;
    top: 0;
    height: 100%;
    width: 5px;
    cursor: col-resize;
    z-index: 2;
  }

  .col-resizer:hover,
  .col-resizer.resizing {
    background: var(--accent);
    opacity: 0.45;
  }
</style>
<script>
  document.addEventListener('DOMContentLoaded', function () {
    var topbar = document.querySelector('.topbar');
    var onav   = document.querySelector('.o-nav');
    var wrap   = document.getElementById('page-wrap');
    if (!topbar || !onav) return;
    function adjust() {
      var topbarH = topbar.offsetHeight;
      var bodyPT  = parseInt(getComputedStyle(document.body).paddingTop) || 0;
      onav.style.top = topbarH + 'px';
      if (wrap) {
        wrap.style.paddingTop = Math.max(0, topbarH + onav.offsetHeight - bodyPT) + 'px';
      }
    }
    adjust();
    window.addEventListener('resize', adjust);
  });
</script>
