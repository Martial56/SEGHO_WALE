{% with uname=request.resolver_match.url_name %}
<nav class="o-nav">
  <a href="{% url 'dashboard' %}" class="o-nav-grid" title="Accueil">
    <i class="bi bi-grid-3x3-gap-fill"></i>
  </a>
  <span class="o-nav-brand">
    <i class="bi bi-box-seam"></i>
    Services
  </span>

  <a href="{% url 'services:list' %}"
     class="o-nav-link {% if uname == 'list' or uname == 'detail' or uname == 'create' or uname == 'edit' or uname == 'regles_prix' %}active{% endif %}">
    Prestations
  </a>

  <a href="{% url 'services:categories' %}"
     class="o-nav-link {% if uname == 'categories' or uname == 'categorie_create' or uname == 'categorie_edit' or uname == 'categorie_detail' or uname == 'categorie_delete' %}active{% endif %}">
    Catégories
  </a>

  {% comment %}
  Unités de mesure — désactivé à la demande (menu réduit à Prestations/Catégories)
  <a href="{% url 'services:unites' %}"
     class="o-nav-link {% if uname == 'unites' or uname == 'unite_create' or uname == 'unite_edit' or uname == 'unite_detail' or uname == 'unite_delete' or uname == 'categories_unites' or uname == 'categorie_unite_create' or uname == 'categorie_unite_edit' or uname == 'categorie_unite_detail' or uname == 'categorie_unite_delete' %}active{% endif %}">
    Unités de mesure
  </a>
  {% endcomment %}
</nav>
{% endwith %}
