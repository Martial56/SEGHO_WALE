{% extends 'base.html' %}
{% load i18n %}

{% block topbar_title %}Personnel{% endblock %}

{% block extra_css %}
{% include 'services/includes/layout_css.html' %}
{% endblock %}

{% block module_navbar %}
<style>
.module-nav {
    background: var(--teal-700);
    display: flex;
    align-items: center;
    padding: 0 32px;
    height: 44px;
    box-shadow: 0 2px 6px rgba(0,0,0,0.18);
    position: relative;
    z-index: 200;
}
.module-nav-brand {
    display: flex;
    align-items: center;
    gap: 8px;
    color: #fff;
    font-weight: 700;
    font-size: 14px;
    padding-right: 20px;
    border-right: 1px solid rgba(255,255,255,0.2);
    margin-right: 4px;
    flex-shrink: 0;
}
.module-nav-links {
    display: flex;
    align-items: center;
    height: 100%;
}
.module-nav-link {
    color: rgba(255,255,255,0.82);
    text-decoration: none;
    padding: 0 16px;
    height: 100%;
    display: flex;
    align-items: center;
    font-size: 13px;
    font-weight: 500;
    border: none;
    background: none;
    cursor: pointer;
    transition: background 0.15s, color 0.15s;
    white-space: nowrap;
    font-family: 'Sora', sans-serif;
    gap: 5px;
}
.module-nav-link:hover { background: rgba(255,255,255,0.12); color: #fff; }
.module-nav-link.active { background: rgba(0,0,0,0.25); color: #fff; font-weight: 600; }
html[data-theme="dark"] .module-nav { background: #0a1e2e; border-bottom: 1px solid rgba(255,255,255,0.06); }
html[data-theme="dark"] .module-nav-brand { border-right-color: rgba(255,255,255,0.1); }
</style>
<nav class="module-nav">
    <div class="module-nav-brand">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2">
            <path d="M12 2a3 3 0 1 0 0 6 3 3 0 0 0 0-6z"/>
            <path d="M12 8v5"/>
            <path d="M9 13H6a2 2 0 0 0-2 2v2a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2v-2a2 2 0 0 0-2-2h-3"/>
            <circle cx="12" cy="19" r="1"/>
        </svg>
        Personnel
    </div>
    <div class="module-nav-links">
        <a href="{% url 'personnel:list' %}" class="module-nav-link active">Personnel</a>
    </div>
</nav>
{% endblock %}

{% block breadcrumb %}{% endblock %}
