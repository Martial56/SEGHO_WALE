    {# Bloc JS partagé : recherche patient en autocomplétion + code de confirmation RDV.
       Doit être inclus à l'intérieur d'une IIFE <script> existante (voir usages).
       Attend dans le DOM : #id_patient, #id_code_confirmation, #code-confirmation,
       #patient-search, #ac-dropdown, #patient-age, #patient-tel.
       Attend dans le contexte (optionnels) : patient_prefill, rdv (avec rdv.code_confirmation). #}
    /* ── Autocomplete patient (AJAX) ── */
    var patientHidden    = document.getElementById('id_patient');
    var codeHidden       = document.getElementById('id_code_confirmation');
    var codeDisplay      = document.getElementById('code-confirmation');
    var searchInput      = document.getElementById('patient-search');
    var dropdown         = document.getElementById('ac-dropdown');
    var focusedIdx       = -1;
    var searchTimer      = null;
    var SEARCH_URL       = '{% url "patients:patient_search" %}';
    var INFO_URL         = '{% url "patients:patient_info" 0 %}';

    function generateConfirmCode() {
        var now = new Date();
        var pad = function(n) { return String(n).padStart(2, '0'); };
        var d = String(now.getFullYear()).slice(-2) + pad(now.getMonth()+1) + pad(now.getDate());
        var t = pad(now.getHours()) + pad(now.getMinutes());
        var r = Math.floor(Math.random() * 9000 + 1000);
        return 'RDV' + d + '-' + t + r;
    }

    function highlight(text, q) {
        if (!q) return text;
        var i = text.toLowerCase().indexOf(q.toLowerCase());
        if (i < 0) return text;
        return text.slice(0, i) +
               '<mark class="ac-mark">' + text.slice(i, i + q.length) + '</mark>' +
               text.slice(i + q.length);
    }

    function renderResults(results, q) {
        dropdown.innerHTML = '';
        focusedIdx = -1;
        if (!results.length) {
            dropdown.innerHTML = '<div class="ac-empty">Aucun patient trouvé</div>';
            dropdown.style.display = 'block';
            return;
        }
        results.forEach(function(p) {
            var div = document.createElement('div');
            div.className = 'ac-item';
            div.innerHTML =
                '<strong>' + highlight(p.nom_complet, q) + '</strong>' +
                '<br><span style="font-size:11px;color:rgba(0,0,0,0.4);">' +
                highlight(p.code, q) +
                (p.telephone ? ' · ' + highlight(p.telephone, q) : '') +
                '</span>';
            div.addEventListener('mousedown', function(e) {
                e.preventDefault();
                selectPatient(p.id, p.nom_complet);
            });
            dropdown.appendChild(div);
        });
        dropdown.style.display = 'block';
    }

    function doSearch(q) {
        fetch(SEARCH_URL + '?q=' + encodeURIComponent(q))
            .then(function(r){ return r.json(); })
            .then(function(d){ renderResults(d.results, q); })
            .catch(function() { dropdown.style.display = 'none'; });
    }

    function selectPatient(id, nom) {
        patientHidden.value = id;
        searchInput.value   = nom;
        dropdown.style.display = 'none';
        fetchPatientInfo(id);
        /* Générer le code de confirmation si pas déjà présent */
        if (!codeHidden.value) {
            var code = generateConfirmCode();
            codeHidden.value = code;
            codeDisplay.textContent = code;
            codeDisplay.classList.remove('placeholder');
        }
    }

    function moveFocus(dir) {
        var items = dropdown.querySelectorAll('.ac-item');
        if (!items.length) return;
        focusedIdx = Math.max(0, Math.min(focusedIdx + dir, items.length - 1));
        items.forEach(function(el, i){ el.classList.toggle('focused', i === focusedIdx); });
        items[focusedIdx].scrollIntoView({ block: 'nearest' });
    }

    if (searchInput) {
        searchInput.addEventListener('focus', function() {
            if (!patientHidden.value) {
                clearTimeout(searchTimer);
                searchTimer = setTimeout(function(){ doSearch(searchInput.value.trim()); }, 100);
            }
        });
        searchInput.addEventListener('input', function() {
            clearTimeout(searchTimer);
            var q = this.value.trim();
            patientHidden.value = '';
            /* Réinitialiser le code si le patient est désélectionné */
            if (!q) {
                codeHidden.value = '';
                codeDisplay.textContent = 'Sélectionnez un patient…';
                codeDisplay.classList.add('placeholder');
            }
            searchTimer = setTimeout(function(){ doSearch(q); }, 220);
        });
        searchInput.addEventListener('keydown', function(e) {
            if (e.key === 'ArrowDown')  { e.preventDefault(); moveFocus(1); }
            else if (e.key === 'ArrowUp')   { e.preventDefault(); moveFocus(-1); }
            else if (e.key === 'Enter') {
                var items = dropdown.querySelectorAll('.ac-item');
                if (focusedIdx >= 0 && items[focusedIdx]) {
                    e.preventDefault();
                    items[focusedIdx].dispatchEvent(new MouseEvent('mousedown'));
                }
            }
            else if (e.key === 'Escape') { dropdown.style.display = 'none'; }
        });
        searchInput.addEventListener('blur', function(){
            setTimeout(function(){ dropdown.style.display = 'none'; }, 200);
        });

        /* Pré-remplir si patient passé en paramètre (mode création uniquement) */
        {% if patient_prefill and not rdv %}
        searchInput.value = '{{ patient_prefill.nom }} {{ patient_prefill.prenoms }}';
        patientHidden.value = '{{ patient_prefill.pk }}';
        fetchPatientInfo('{{ patient_prefill.pk }}');
        if (!codeHidden.value) {
            var code = generateConfirmCode();
            codeHidden.value = code;
            codeDisplay.textContent = code;
            codeDisplay.classList.remove('placeholder');
        }
        {% endif %}
    }

    /* ── Info patient (âge + téléphone) ── */
    function fetchPatientInfo(pk) {
        if (!pk) { setPlaceholder('patient-age', '—'); setPlaceholder('patient-tel', '—'); return; }
        fetch(INFO_URL.replace('/0/', '/' + pk + '/'))
            .then(function(r){ return r.json(); })
            .then(function(d) {
                var ageEl = document.getElementById('patient-age');
                var telEl = document.getElementById('patient-tel');
                ageEl.textContent = d.age + ' ans';
                ageEl.classList.remove('placeholder');
                telEl.textContent = d.telephone || '—';
                telEl.classList.remove('placeholder');
            });
    }

    function setPlaceholder(id, text) {
        var el = document.getElementById(id);
        if (el) { el.textContent = text; el.classList.add('placeholder'); }
    }

    if (patientHidden && patientHidden.value) fetchPatientInfo(patientHidden.value);

    /* En mode édition : générer le code si absent */
    {% if rdv and not rdv.code_confirmation %}
    if (!codeHidden.value) {
        var editCode = generateConfirmCode();
        codeHidden.value = editCode;
        codeDisplay.textContent = editCode;
        codeDisplay.classList.remove('placeholder');
    }
    {% endif %}
