{% extends 'base.html' %}
{% load i18n %}
{% block topbar_title %}Patients{% endblock %}

{% block module_navbar %}
<nav class="o-nav">
  <a href="{% url 'dashboard' %}" class="o-nav-grid" title="Accueil">
    <i class="bi bi-grid-3x3-gap-fill"></i>
  </a>
  <span class="o-nav-brand">
    <i class="bi bi-person-lines-fill"></i>
    Patients
  </span>
  <a href="{% url 'patients:list' %}" class="o-nav-link {% if request.resolver_match.url_name == 'list' or request.resolver_match.url_name == 'detail' or request.resolver_match.url_name == 'create' or request.resolver_match.url_name == 'edit' %}active{% endif %}">Patients</a>
  <a href="{% url 'patients:rdv_global' %}" class="o-nav-link {% if request.resolver_match.url_name == 'rdv_global' or request.resolver_match.url_name == 'rdv_create' or request.resolver_match.url_name == 'rdv_edit' or request.resolver_match.url_name == 'rdv_list' %}active{% endif %}">Rendez-vous</a>
  <a href="{% url 'patients:pathologie_list' %}" class="o-nav-link {% if request.resolver_match.url_name == 'pathologie_list' or request.resolver_match.url_name == 'pathologie_create' or request.resolver_match.url_name == 'pathologie_edit' %}active{% endif %}">Pathologies</a>
  <a href="{% url 'patients:typevisite_list' %}" class="o-nav-link {% if request.resolver_match.url_name == 'typevisite_list' or request.resolver_match.url_name == 'typevisite_create' or request.resolver_match.url_name == 'typevisite_edit' %}active{% endif %}">Types de visite</a>
</nav>
{% endblock %}

{% block breadcrumb %}{% endblock %}
