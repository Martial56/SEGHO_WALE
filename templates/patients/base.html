{% extends 'base.html' %}
{% load i18n static %}

{% block topbar_title %}Patients{% endblock %}

{% block extra_css %}
<link rel="stylesheet" href="{% static 'vendor/bootstrap-icons/bootstrap-icons.min.css' %}">
<style>
    .content { padding-top: 0 !important; }
    .patient-card { cursor: pointer; transition: all 0.2s; }
    .patient-card:hover { transform: translateY(-2px); }

    /* ── Dropdown dans la nav patients ── */
    .o-nav-dd { position: relative; display: inline-flex; align-items: stretch; }
    .o-nav-dd-trigger { cursor: pointer; user-select: none; }
    .o-nav-dd-panel {
      display: none; position: absolute; top: 100%; left: 0;
      background: #fff; border: 1px solid #dde3ec;
      border-radius: 6px; box-shadow: 0 8px 28px rgba(0,0,0,0.16);
      min-width: 200px; padding: 5px 0; z-index: 9999;
    }
    .o-nav-dd:hover .o-nav-dd-panel { display: block; }
    .o-nav-dd-item {
      display: flex; align-items: center; gap: 8px;
      padding: 8px 16px; font-size: 12.5px; color: var(--text);
      text-decoration: none; transition: background 0.1s; white-space: nowrap;
    }
    .o-nav-dd-item:hover { background: var(--teal-50); color: var(--teal-600); }
    .o-nav-dd-item.active { background: var(--teal-50); color: var(--teal-600); font-weight: 600; }
    html[data-theme="dark"] .o-nav-dd-panel { background: #1a2535; border-color: #2e3f58; }
    html[data-theme="dark"] .o-nav-dd-item { color: var(--text); }
    html[data-theme="dark"] .o-nav-dd-item:hover { background: rgba(var(--teal-500-rgb),0.2); color: var(--teal-300); }
</style>
<script>
  (function () {
    function syncTopbarH() {
      var topbar = document.querySelector('.topbar');
      if (topbar) {
        document.documentElement.style.setProperty('--topbar-h', topbar.getBoundingClientRect().height + 'px');
      }
    }
    if (document.readyState === 'loading') {
      document.addEventListener('DOMContentLoaded', syncTopbarH);
    } else {
      syncTopbarH();
    }
    window.addEventListener('resize', syncTopbarH);
  })();
</script>
{% endblock %}

{% block module_navbar %}
{% include 'patients/includes/nav.html' %}
{% endblock %}

{% block breadcrumb %}{% endblock %}
