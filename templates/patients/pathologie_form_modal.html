<form method="post" id="mdcfgConfigForm" data-url="{{ request.path }}" novalidate>
{% csrf_token %}

<div class="mdcfg-modal-body">

  <div class="form-field">
    <label class="field-label" for="{{ form.nom.id_for_label }}">Nom de la pathologie <span class="required-star">*</span></label>
    {{ form.nom }}
    {% if form.nom.errors %}<div class="field-error">{{ form.nom.errors.0 }}</div>{% endif %}
  </div>

  <div class="form-field">
    <label class="field-label" for="{{ form.description.id_for_label }}">Description</label>
    {{ form.description }}
    {% if form.description.errors %}<div class="field-error">{{ form.description.errors.0 }}</div>{% endif %}
  </div>

  <div class="form-field" style="display:flex;align-items:center;gap:8px;">
    {{ form.actif }}
    <label for="{{ form.actif.id_for_label }}" style="font-size:13px;font-weight:400;color:var(--text-primary);margin:0;">
      Pathologie active
    </label>
  </div>

</div>

<div class="mdcfg-modal-footer">
  <button type="button" class="btn-form-cancel" onclick="mdCloseConfigModal()">Annuler</button>
  <button type="submit" class="btn-form-submit">{% if edit %}Enregistrer{% else %}Créer{% endif %}</button>
</div>

</form>
