<style>
  @import url('https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500&display=swap');

  :root {
    --primary: #9b2335;
    --primary-dark: #7a1a28;
    --nav-bg: #ffffff;
    --accent: #c0392b;
    --bg: #f9f9f9;
    --surface: #ffffff;
    --border: #d9d9d9;
    --text: #212529;
    --text-muted: #6c757d;
  }

  html[data-theme="dark"] {
    --bg: #181c28;
    --surface: #21283a;
    --border: #2d3550;
    --text: #c5d4e2;
    --text-muted: #6c85a0;
  }

  *, *::before, *::after { box-sizing: border-box; }
  body { font-family: 'Roboto', sans-serif; background: var(--bg) !important; color: var(--text); }
  html { background: var(--bg) !important; }

  .topbar { position: fixed !important; top: 0 !important; left: 0 !important; right: 0 !important; z-index: 201 !important; }
  .breadcrumb { display: none !important; }
  .content { padding: 0 !important; overflow-x: hidden; }

  /* ── O-NAV ── */
  .o-nav {
    background: var(--nav-bg); display: flex; align-items: center;
    height: 38px; padding: 0 10px;
    border-bottom: 1px solid #e0e0e0;
    box-shadow: 0 1px 3px rgba(0,0,0,.07);
  }
  .o-nav-grid {
    width: 32px; height: 32px; display: flex; align-items: center; justify-content: center;
    color: rgba(0,0,0,.45); font-size: 17px; cursor: pointer;
    border-radius: 4px; margin-right: 4px; transition: background .15s; text-decoration: none;
  }
  .o-nav-grid:hover { background: rgba(0,0,0,.06); color: var(--primary); }
  .o-nav-brand {
    font-size: 14px; font-weight: 600; color: var(--primary);
    padding: 0 12px 0 4px; margin-right: 2px;
    border-right: 1px solid rgba(0,0,0,.12);
    white-space: nowrap; display: flex; align-items: center; gap: 6px;
  }
  .o-nav-link {
    color: rgba(0,0,0,.58); text-decoration: none; font-size: 13px;
    padding: 0 12px; height: 38px; display: flex; align-items: center;
    border-bottom: 2px solid transparent;
    transition: color .15s, background .15s, border-color .15s; white-space: nowrap;
  }
  .o-nav-link:hover, .o-nav-link.active {
    color: var(--primary); background: rgba(155,35,53,.06); border-bottom-color: var(--primary);
  }
  html[data-theme="dark"] .o-nav { background: #0a1e2e; border-bottom-color: rgba(255,255,255,.06); box-shadow: none; }
  html[data-theme="dark"] .o-nav-grid { color: rgba(255,255,255,.5); }
  html[data-theme="dark"] .o-nav-grid:hover { background: rgba(255,255,255,.08); color: #e88a96; }
  html[data-theme="dark"] .o-nav-brand { color: #e88a96; border-right-color: rgba(255,255,255,.1); }
  html[data-theme="dark"] .o-nav-link { color: rgba(255,255,255,.6); }
  html[data-theme="dark"] .o-nav-link:hover,
  html[data-theme="dark"] .o-nav-link.active { color: #f5c0c8; background: rgba(192,57,43,.1); border-bottom-color: #d9534f; }

  /* ── SUBHEADER ── */
  .o-subheader {
    background: var(--surface); border-bottom: 1px solid var(--border);
    padding: 6px 16px; display: flex; flex-direction: column; gap: 5px;
  }
  .o-subheader-row { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
  .o-page-title { font-size: 17px; font-weight: 400; color: var(--text); }
  .o-page-count { font-size: 12px; color: var(--text-muted); font-weight: 400; margin-left: 3px; }
  html[data-theme="dark"] .o-subheader { background: var(--surface); border-bottom-color: var(--border); }

  /* ── BOUTON CRÉER ── */
  .o-btn-create {
    background: var(--accent); color: #fff; border: none;
    padding: 5px 14px; border-radius: 4px; font-size: 12.5px;
    font-weight: 500; font-family: 'Roboto', sans-serif;
    cursor: pointer; text-decoration: none;
    display: inline-flex; align-items: center; gap: 5px;
    letter-spacing: .5px; transition: background .15s; white-space: nowrap;
  }
  .o-btn-create:hover { background: var(--primary); }

  /* ── RECHERCHE ── */
  .o-search-bar {
    display: flex; align-items: center;
    border: none; border-bottom: 1px solid #bbb;
    background: transparent; min-height: 28px; padding: 2px 4px; gap: 4px; width: 280px;
  }
  .o-search-input {
    border: none; outline: none; font-size: 12px;
    font-family: 'Roboto', sans-serif; color: var(--text); flex: 1;
    min-width: 60px; background: transparent;
  }
  .o-search-btn { background: none; border: none; cursor: pointer; color: var(--text-muted); font-size: 13px; padding: 2px; }
  html[data-theme="dark"] .o-search-input { color: var(--text); }
  html[data-theme="dark"] .o-search-bar { border-bottom-color: #3a4a62; }

  /* ── CTRL BTN ── */
  .o-ctrl-btn {
    background: none; border: 1px solid transparent; border-radius: 4px;
    padding: 4px 8px; font-size: 12px; font-family: 'Roboto', sans-serif;
    color: var(--text-muted); cursor: pointer;
    display: flex; align-items: center; gap: 4px;
    transition: border-color .15s, color .15s, background .15s;
    white-space: nowrap; text-decoration: none;
  }
  .o-ctrl-btn:hover { border-color: var(--border); color: var(--text); background: #f3f3f3; }
  .o-ctrl-btn.active { border-color: #aaa; color: var(--text); background: #efefef; }
  html[data-theme="dark"] .o-ctrl-btn { color: var(--text-muted); }
  html[data-theme="dark"] .o-ctrl-btn:hover { background: #28304a; color: var(--text); border-color: var(--border); }

  .o-ctrl-sep { width: 1px; height: 18px; background: var(--border); margin: 0 3px; flex-shrink: 0; }

  /* ── FILTER TAG ── */
  .o-filter-tag {
    display: inline-flex; align-items: center; gap: 3px;
    background: #fde8ea; color: var(--primary);
    border: 1px solid #f5b8bd; border-radius: 3px;
    padding: 1px 6px; font-size: 11.5px; font-weight: 500; white-space: nowrap;
  }
  .o-filter-tag a { color: #888; text-decoration: none; font-size: 14px; line-height: 1; margin-left: 2px; }
  .o-filter-tag a:hover { color: #333; }

  /* ── FILTRES PANEL ── */
  .filters-panel {
    display: none; gap: 8px; flex-wrap: wrap; align-items: center;
    padding: 8px 16px; background: #fdf5f5; border-bottom: 1px solid var(--border);
  }
  .filters-panel.open { display: flex; }
  .filter-select {
    border: 1px solid var(--border); border-radius: 4px; padding: 4px 10px;
    font-family: 'Roboto', sans-serif; font-size: 12px; color: var(--text);
    background: var(--surface); cursor: pointer; outline: none;
  }
  .filter-select:focus { border-color: var(--accent); }
  html[data-theme="dark"] .filters-panel { background: #1a2133; border-bottom-color: var(--border); }
  html[data-theme="dark"] .filter-select { background: var(--surface); border-color: var(--border); color: var(--text); }

  /* ── STATS ROW ── */
  .stats-row {
    display: grid; grid-template-columns: repeat(4, 1fr); gap: 0;
    border-bottom: 1px solid var(--border); background: var(--surface);
  }
  .stat-box {
    padding: 12px 18px; border-right: 1px solid var(--border);
    display: flex; align-items: center; gap: 12px;
  }
  .stat-box:last-child { border-right: none; }
  .stat-icon {
    width: 36px; height: 36px; border-radius: 8px;
    display: flex; align-items: center; justify-content: center;
    font-size: 16px; flex-shrink: 0;
  }
  .stat-icon.rose    { background: #fde8ea; color: #9b2335; }
  .stat-icon.green   { background: #e3f5ef; color: #1a5c4a; }
  .stat-icon.amber   { background: #fff8e1; color: #b07d00; }
  .stat-icon.red     { background: #fde8ea; color: #c0392b; }

  html[data-theme="dark"] .stats-row  { background: var(--surface); border-bottom-color: var(--border); }
  html[data-theme="dark"] .stat-box   { border-right-color: var(--border); }
  html[data-theme="dark"] .stat-icon.rose  { background: rgba(155,35,53,.25); color: #f5a0a8; }
  html[data-theme="dark"] .stat-icon.green { background: rgba(26,92,74,.25); color: #6eddb0; }
  html[data-theme="dark"] .stat-icon.amber { background: rgba(176,125,0,.2); color: #e2c16a; }
  html[data-theme="dark"] .stat-icon.red   { background: rgba(192,57,43,.25); color: #f5a0a8; }

  .stat-label { font-size: 11px; color: var(--text-muted); margin-bottom: 2px; }
  .stat-value { font-size: 22px; font-weight: 700; color: var(--text); line-height: 1.1; }

  @media (max-width: 800px) {
    .stats-row { grid-template-columns: repeat(2, 1fr); }
    .stat-box:nth-child(2) { border-right: none; }
    .stat-box:nth-child(3) { border-right: 1px solid var(--border); }
  }

  /* ── TABLE ── */
  .o-list-wrap { background: var(--bg); overflow-x: auto; }
  .o-list-table {
    width: 100%; border-collapse: collapse; background: var(--surface);
  }
  .o-list-table th {
    padding: 7px 10px; text-align: left; font-size: 10.5px; font-weight: 600;
    color: var(--text-muted); border-bottom: 1px solid var(--border);
    background: var(--surface); white-space: nowrap;
  }
  .o-list-table td {
    padding: 8px 10px; font-size: 12px; border-bottom: 1px solid #f0f0f0; color: var(--text);
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }
  .o-list-table tr:last-child td { border-bottom: none; }
  .o-list-table tbody tr:hover td { background: #fdf5f5; }
  .o-list-table tbody tr { cursor: pointer; }

  html[data-theme="dark"] .o-list-table { background: var(--surface); }
  html[data-theme="dark"] .o-list-table th { background: var(--surface); border-bottom-color: var(--border); color: var(--text-muted); }
  html[data-theme="dark"] .o-list-table td { border-bottom-color: #2d3550; color: var(--text); }
  html[data-theme="dark"] .o-list-table tbody tr:hover td { background: rgba(255,255,255,.04); }

  /* ── PAGINATION ── */
  .o-pagination-bottom {
    display: flex; align-items: center; gap: 6px;
    justify-content: center; padding: 14px 0;
    border-top: 1px solid var(--border);
    font-size: 12px; color: var(--text-muted);
  }
  .o-pag-btn {
    width: 24px; height: 24px; border: 1px solid var(--border); border-radius: 3px;
    background: var(--surface); display: flex; align-items: center; justify-content: center;
    color: var(--text-muted); text-decoration: none; font-size: 12px; cursor: pointer;
    transition: background .15s, color .15s;
  }
  .o-pag-btn:hover { background: var(--accent); color: #fff; border-color: var(--accent); }
  .o-pag-btn.disabled { opacity: .35; pointer-events: none; }
  html[data-theme="dark"] .o-pag-btn { background: var(--surface); border-color: var(--border); color: var(--text-muted); }

  /* ── VIDE ── */
  .o-empty { text-align: center; padding: 60px 20px; color: var(--text-muted); font-size: 13px; }
  .o-empty i { font-size: 36px; display: block; margin-bottom: 10px; opacity: .5; }

  /* ── STOCK CHIPS ── */
  .stock-chip {
    display: inline-flex; align-items: center; gap: 4px;
    padding: 2px 8px; border-radius: 10px; font-size: 10.5px; font-weight: 600;
  }
  .stock-chip::before { content: ''; width: 5px; height: 5px; border-radius: 50%; flex-shrink: 0; }
  .stock-ok      { background: #e3f5ef; color: #1a5c4a; } .stock-ok::before      { background: #22c55e; }
  .stock-alerte  { background: #fff8e1; color: #92400e; } .stock-alerte::before  { background: #f59e0b; }
  .stock-rupture { background: #fde8ea; color: #9b1f2a; } .stock-rupture::before { background: #ef4444; }

  html[data-theme="dark"] .stock-ok      { background: rgba(26,92,74,.3);  color: #6eddb0; }
  html[data-theme="dark"] .stock-alerte  { background: rgba(176,125,0,.25); color: #e2c16a; }
  html[data-theme="dark"] .stock-rupture { background: rgba(192,57,43,.3); color: #f5a0a8; }
</style>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
<script>
  document.addEventListener('DOMContentLoaded', function () {
    var topbar = document.querySelector('.topbar');
    var wrap   = document.getElementById('page-wrap');
    function adj() { if (topbar && wrap) wrap.style.paddingTop = topbar.offsetHeight + 'px'; }
    adj(); window.addEventListener('resize', adj);
  });
</script>
