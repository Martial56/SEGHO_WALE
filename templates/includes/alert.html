{% if alert_message %}
    <div class="alert alert-{{ alert_type|default:'info' }}">
        <span>
            {% if alert_type == 'success' %}✓{% elif alert_type == 'error' %}✕{% elif alert_type == 'warning' %}⚠{% else %}ℹ{% endif %}
        </span>
        <span>{{ alert_message }}</span>
    </div>
{% endif %}
