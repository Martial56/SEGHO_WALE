{% load static %}
<div class="topbar">
    <div class="topbar-left">
        <a href="/" style="text-decoration:none;display:flex;align-items:center;gap:10px;margin-right:8px;">
            <img src="{% static 'logo.png' %}" alt="Logo WALÉ" style="width:38px;height:38px;object-fit:contain;">
            <span style="font-size:13px;font-weight:700;color:var(--teal-600);">SEGHO-WALE</span>
        </a>
        <span style="width:1px;height:24px;background:rgba(0,0,0,0.1);display:block;"></span>
        <div class="topbar-title">{% block topbar_title %}SEGHO-WALE{% endblock %}</div>
    </div>
    <div class="topbar-right">
        <button class="theme-toggle" id="theme-toggle" title="Thème sombre / clair">
            <svg class="icon-sun" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <circle cx="12" cy="12" r="5"/>
                <line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/>
                <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/>
                <line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/>
                <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/>
            </svg>
            <svg class="icon-moon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
            </svg>
        </button>
        <button class="topbar-action" title="Notifications">🔔</button>
        {% if user.is_authenticated %}
        <span style="font-size:13px;color:var(--teal-700);font-weight:600;">{{ user.get_full_name|default:user.username }}</span>
        <form method="post" action="{% url 'logout' %}" style="margin:0;">
            {% csrf_token %}
            <button type="submit" class="topbar-action" title="Déconnexion" style="font-size:14px;font-weight:600;">⏻</button>
        </form>
        {% endif %}
    </div>
</div>

<script>
(function() {
    const html = document.documentElement;
    const btn  = document.getElementById('theme-toggle');
    if (!btn) return;
    btn.addEventListener('click', () => {
        const isDark = html.getAttribute('data-theme') === 'dark';
        if (isDark) {
            html.removeAttribute('data-theme');
            localStorage.setItem('segho-theme', 'light');
        } else {
            html.setAttribute('data-theme', 'dark');
            localStorage.setItem('segho-theme', 'dark');
        }
    });
})();
</script>
