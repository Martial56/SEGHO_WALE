<nav class="breadcrumb">
    <a href="{% url 'dashboard' %}">
        <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2" style="vertical-align:-2px;margin-right:3px"><path d="M3 9.5L12 3l9 6.5V20a1 1 0 0 1-1 1H5a1 1 0 0 1-1-1V9.5z"/><polyline points="9 21 9 12 15 12 15 21"/></svg>Accueil
    </a>
    {% for item in breadcrumb %}
        {% if item.title != "Accueil" %}
        <span class="breadcrumb-sep">›</span>
        {% if item.url %}
            <a href="{{ item.url }}">{{ item.title }}</a>
        {% else %}
            <span>{{ item.title }}</span>
        {% endif %}
        {% endif %}
    {% endfor %}
</nav>
