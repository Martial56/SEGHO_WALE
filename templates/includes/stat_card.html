<div class="card">
    <div style="display: flex; justify-content: space-between; align-items: flex-start;">
        <div>
            <p class="card-meta">{{ stat_label }}</p>
            <div class="card-stat">{{ stat_value }}</div>
        </div>
        {% if stat_icon %}
            <div style="font-size: 32px; opacity: 0.6;">{{ stat_icon }}</div>
        {% endif %}
    </div>
    {% if stat_change %}
        <p class="card-meta" style="margin-top: 12px;">
            <span style="color: {% if stat_change_positive %}var(--green){% else %}var(--rose){% endif %};">
                {% if stat_change_positive %}↑{% else %}↓{% endif %} {{ stat_change }}
            </span>
            par rapport à {{ stat_period }}
        </p>
    {% endif %}
</div>
