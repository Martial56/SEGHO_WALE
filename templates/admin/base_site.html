{% extends "admin/base.html" %}
{% load i18n %}

{% block title %}{{ title }} | SEGHO-WALE{% endblock %}

{% block branding %}
<h1 id="site-name">
    <a href="{% url 'admin:index' %}">
        🏥 SEGHO-WALE
        <span style="font-size:0.6em; font-weight:normal; color:#a8d8ea; display:block; margin-top:-5px;">Centre Médico-Social WALÉ — Yamoussoukro</span>
    </a>
</h1>
{% endblock %}

{% block extrastyle %}
{{ block.super }}
<style>
:root {
    --primary: #1a6b8a;
    --secondary: #2d9cdb;
    --accent: #27ae60;
}
#header {
    background: linear-gradient(135deg, #1a6b8a 0%, #2d9cdb 100%) !important;
}
.module h2, .module caption, .inline-group h2 {
    background: #1a6b8a !important;
}
div.breadcrumbs {
    background: #2d9cdb !important;
}
a:link, a:visited {
    color: #1a6b8a;
}
.button, input[type=submit], input[type=button], .submit-row input, a.button {
    background: #1a6b8a !important;
    border-color: #1a6b8a !important;
}
.button:hover, input[type=submit]:hover {
    background: #2d9cdb !important;
    border-color: #2d9cdb !important;
}
#content h1 { color: #1a6b8a; }
</style>
{% endblock %}
