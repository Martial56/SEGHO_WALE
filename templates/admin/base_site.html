{% extends "admin/base.html" %}
{% load i18n static %}

{% block title %}{{ title }} | SEGHO-WALE{% endblock %}

{% block branding %}
<h1 id="site-name">
    <a href="{% url 'admin:index' %}">
        <img src="{% static 'logo.png' %}" alt="Logo WALÉ" style="width:42px;height:42px;object-fit:contain;vertical-align:middle;margin-right:8px;"> SEGHO-WALE
        <span style="font-size:0.6em; font-weight:normal; color:#a8d8ea; display:block; margin-top:-5px;">Centre Médico-Social WALÉ — Yamoussoukro</span>
    </a>
</h1>
{% endblock %}

{% block extrastyle %}
{{ block.super }}
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<style>
body, input, select, textarea, button { font-family: 'Sora', sans-serif !important; }
:root {
    --primary: #1a6b8a;
    --secondary: #2d9cdb;
    --accent: #27ae60;
}
#header {
    background: linear-gradient(135deg, #1a6b8a 0%, #2d9cdb 100%) !important;
}
.module h2, .module caption, .inline-group h2 {
    background: #1a6b8a !important;
}
div.breadcrumbs {
    background: #2d9cdb !important;
}
a:link, a:visited {
    color: #1a6b8a;
}
.button, input[type=submit], input[type=button], .submit-row input, a.button {
    background: #1a6b8a !important;
    border-color: #1a6b8a !important;
}
.button:hover, input[type=submit]:hover {
    background: #2d9cdb !important;
    border-color: #2d9cdb !important;
}
#content h1 { color: #1a6b8a; }
</style>
{% endblock %}
