<style>
  /* ═══════════════════════════════════════════════════════
     SOINS — STATUT : composants partagés (module entier)
     • .stp-stepper  → barre de progression (form + detail)
     • .badge-statut → badges compacts (liste)
  ═══════════════════════════════════════════════════════ */

  /* ── Barre statut : pleine largeur ── */
  .art-status-bar, .det-status-bar {
    display: flex; align-items: stretch;
    padding: 0; border-bottom: 1px solid var(--border); overflow: hidden;
  }
  .art-header > .art-status-bar:first-child,
  .det-header > .det-status-bar:first-child { border-radius: 8px 8px 0 0; overflow: hidden; }

  /* ── Stepper pleine largeur ── */
  .stp-stepper {
    display: flex; align-items: stretch; width: 100%;
    background: transparent; border: none; border-radius: 0; padding: 0; gap: 0;
  }
  .stp-flow { display: flex; align-items: stretch; flex: 1; }

  .stp-step {
    display: flex; align-items: center; justify-content: center; gap: 6px;
    flex: 1; padding: 9px 8px; border-radius: 0;
    font-size: 11.5px; font-weight: 600;
    cursor: default; user-select: none; white-space: nowrap;
    transition: background .18s, color .18s, opacity .18s;
    color: var(--text-muted); border-right: 1px solid var(--border);
  }
  .stp-icon  { font-size: 12px; flex-shrink: 0; }
  .stp-label { font-size: 11px; }

  /* ─ États ─ */
  .stp-step.stp-pending { opacity: .35; }
  .stp-step.stp-done    { background: #f0fdf4; color: #059669; }

  .stp-step[data-val="brouillon"].stp-active            { background: #f1f5f9; color: #334155; }
  .stp-step[data-val="en_attente_de_paiement"].stp-active { background: #dbeafe; color: #1d4ed8; }
  .stp-step[data-val="en_cours"].stp-active             { background: #ffedd5; color: #c2410c; }
  .stp-step[data-val="termine"].stp-active              { background: #dcfce7; color: #15803d; }

  /* ─ Séparateur + Annulé ─ */
  .stp-sep { width: 1px; background: var(--border); flex-shrink: 0; }
  .stp-annule {
    display: flex; align-items: center; justify-content: center; gap: 6px;
    padding: 9px 20px; border-radius: 0; flex-shrink: 0;
    font-size: 11.5px; font-weight: 600;
    cursor: default; user-select: none; white-space: nowrap;
    transition: background .18s, color .18s, opacity .18s;
    color: var(--text-muted);
  }
  .stp-annule.stp-pending { opacity: .35; }
  .stp-annule.stp-active  { background: #fee2e2; color: #b91c1c; }

  /* ─ Dark mode ─ */
  html[data-theme="dark"] .stp-stepper { background: transparent; }
  html[data-theme="dark"] .stp-step.stp-done             { background: rgba(5,150,105,.18); color: #6ee7b7; }
  html[data-theme="dark"] .stp-step[data-val="brouillon"].stp-active    { background: rgba(100,116,139,.22); color: #cbd5e1; }
  html[data-theme="dark"] .stp-step[data-val="en_attente_de_paiement"].stp-active { background: rgba(29,78,216,.22); color: #93c5fd; }
  html[data-theme="dark"] .stp-step[data-val="en_cours"].stp-active     { background: rgba(194,65,12,.2);  color: #fdba74; }
  html[data-theme="dark"] .stp-step[data-val="termine"].stp-active      { background: rgba(21,128,61,.2);  color: #86efac; }
  html[data-theme="dark"] .stp-annule.stp-active { background: rgba(185,28,28,.22); color: #fca5a5; }

  /* ─ Responsive ─ */
  @media (max-width: 640px) {
    .stp-step .stp-label, .stp-annule .stp-label { display: none; }
    .stp-step { padding: 8px 6px; }
    .stp-annule { padding: 8px 12px; }
  }

  /* ── Badges mini (liste) ── */
  .badge-statut {
    display: inline-flex; align-items: center; gap: 5px;
    font-size: 10px; font-weight: 600; padding: 2px 8px 2px 6px;
    border-radius: 20px; white-space: nowrap;
  }
  .badge-statut::before { content: ''; flex-shrink: 0; width: 5px; height: 5px; border-radius: 50%; }
  .badge-brouillon  { background: #f3f4f6; color: #6b7280; }
  .badge-brouillon::before  { background: #9ca3af; }
  .badge-en-attente { background: #eff6ff; color: #1d4ed8; }
  .badge-en-attente::before { background: #3b82f6; }
  .badge-en-cours   { background: #fff8e1; color: #b07d00; }
  .badge-en-cours::before   { background: #d99c2b; }
  .badge-termine    { background: #e3f5ef; color: #1a5c4a; }
  .badge-termine::before    { background: #2ca870; }
  .badge-annule     { background: #fdf0f0; color: #c0392b; }
  .badge-annule::before     { background: #c0392b; }

  html[data-theme="dark"] .badge-brouillon  { background: rgba(107,114,128,.2);  color: #d1d5db; }
  html[data-theme="dark"] .badge-brouillon::before  { background: #9ca3af; }
  html[data-theme="dark"] .badge-en-attente { background: rgba(59,130,246,.2);   color: #93c5fd; }
  html[data-theme="dark"] .badge-en-attente::before { background: #3b82f6; }
  html[data-theme="dark"] .badge-en-cours   { background: rgba(176,125,0,.2);    color: #e2c16a; }
  html[data-theme="dark"] .badge-en-cours::before   { background: #e2c16a; }
  html[data-theme="dark"] .badge-termine    { background: rgba(26,92,74,.25);    color: #6eddb0; }
  html[data-theme="dark"] .badge-termine::before    { background: #6eddb0; }
  html[data-theme="dark"] .badge-annule     { background: rgba(232,69,69,.2);    color: #f09090; }
  html[data-theme="dark"] .badge-annule::before     { background: #f09090; }
</style>
