<style>
  /* ═══════════════════════════════════════════════════════
     SOINS — STATUT : composants partagés (module entier)
     • .pipeline-bar  → barre de progression steps (form + detail)
     • .stp-stepper   → ancien stepper (conservé pour compatibilité)
     • .badge-statut  → badges compacts (liste)
  ═══════════════════════════════════════════════════════ */

  /* ── Pipeline steps (style numéroté) ── */
  .pipeline-bar {
    display: flex; align-items: stretch; overflow-x: auto;
    scrollbar-width: none; border-bottom: 1px solid var(--border);
    background: var(--surface);
  }
  .pipeline-bar::-webkit-scrollbar { display: none; }
  .pipeline-step {
    display: flex; align-items: center; gap: 7px;
    padding: 10px 18px 10px 12px; font-size: 11.5px; font-weight: 700;
    text-transform: uppercase; letter-spacing: .04em;
    color: var(--text-muted); white-space: nowrap;
    border-bottom: 3px solid transparent; cursor: default; user-select: none;
  }
  .pipeline-step .step-num {
    width: 20px; height: 20px; border-radius: 50%;
    background: rgba(0,0,0,.1); color: rgba(0,0,0,.4);
    display: flex; align-items: center; justify-content: center;
    font-size: 10px; font-weight: 800; flex-shrink: 0;
  }
  .pipeline-step.active  { color: var(--accent); border-bottom-color: var(--accent); }
  .pipeline-step.active .step-num { background: var(--accent); color: #fff; }
  .pipeline-step.done .step-num   { background: rgba(26,92,74,.18); color: var(--primary); }
  .pipeline-step.annule  { color: #dc2626; border-bottom-color: #dc2626; }
  .pipeline-step.annule .step-num { background: #fee2e2; color: #dc2626; }
  .pipeline-arrow { align-self: center; color: var(--border); font-size: 14px; padding: 0 2px; flex-shrink: 0; }

  html[data-theme="dark"] .pipeline-bar { background: var(--surface); }
  html[data-theme="dark"] .pipeline-step .step-num        { background: rgba(255,255,255,.1);   color: rgba(255,255,255,.35); }
  html[data-theme="dark"] .pipeline-step.done .step-num   { background: rgba(34,137,107,.3);    color: #7ac4a7; }
  html[data-theme="dark"] .pipeline-step.active .step-num { background: var(--accent); color: #fff; }

  /* ── Barre statut : pleine largeur ── */
  .art-status-bar, .det-status-bar {
    display: flex; align-items: stretch;
    padding: 0; border-bottom: 1px solid var(--border); overflow: hidden;
  }
  .art-header > .art-status-bar:first-child,
  .det-header > .det-status-bar:first-child { border-radius: 8px 8px 0 0; overflow: hidden; }
  /* Stepper circulaire (procédures) : pas de clip pour laisser visible les box-shadows */
  .art-status-bar.proc-stepper-bar,
  .art-header > .art-status-bar.proc-stepper-bar:first-child { overflow: visible; }

  /* ── Stepper pleine largeur ── */
  .stp-stepper {
    display: flex; align-items: stretch; width: 100%;
    background: transparent; border: none; border-radius: 0; padding: 0; gap: 0;
  }
  .stp-flow { display: flex; align-items: stretch; flex: 1; }

  .stp-step {
    display: flex; align-items: center; justify-content: center; gap: 6px;
    flex: 1; padding: 9px 8px; border-radius: 0;
    font-size: 11.5px; font-weight: 600;
    cursor: default; user-select: none; white-space: nowrap;
    transition: background .18s, color .18s, opacity .18s;
    color: var(--text-muted); border-right: 1px solid var(--border);
  }
  .stp-icon  { font-size: 12px; flex-shrink: 0; }
  .stp-label { font-size: 11px; }

  /* ─ États ─ */
  .stp-step.stp-pending { opacity: .35; }
  .stp-step.stp-done    { background: rgba(var(--teal-600-rgb),.1); color: var(--primary); }

  .stp-step[data-val="brouillon"].stp-active            { background: #f1f5f9; color: #334155; }
  .stp-step[data-val="en_attente_de_paiement"].stp-active { background: #dbeafe; color: #1d4ed8; }
  .stp-step[data-val="en_cours"].stp-active             { background: #ffedd5; color: #c2410c; }
  .stp-step[data-val="termine"].stp-active              { background: rgba(var(--teal-600-rgb),.15); color: var(--primary-dark); }

  /* ─ Séparateur + Annulé ─ */
  .stp-sep { width: 1px; background: var(--border); flex-shrink: 0; }
  .stp-annule {
    display: flex; align-items: center; justify-content: center; gap: 6px;
    padding: 9px 20px; border-radius: 0; flex-shrink: 0;
    font-size: 11.5px; font-weight: 600;
    cursor: default; user-select: none; white-space: nowrap;
    transition: background .18s, color .18s, opacity .18s;
    color: var(--text-muted);
  }
  .stp-annule.stp-pending { opacity: .35; }
  .stp-annule.stp-active  { background: #fee2e2; color: #b91c1c; }

  /* ─ Dark mode ─ */
  html[data-theme="dark"] .stp-stepper { background: transparent; }
  html[data-theme="dark"] .stp-step.stp-done             { background: rgba(5,150,105,.18); color: #6ee7b7; }
  html[data-theme="dark"] .stp-step[data-val="brouillon"].stp-active    { background: rgba(100,116,139,.22); color: #cbd5e1; }
  html[data-theme="dark"] .stp-step[data-val="en_attente_de_paiement"].stp-active { background: rgba(29,78,216,.22); color: #93c5fd; }
  html[data-theme="dark"] .stp-step[data-val="en_cours"].stp-active     { background: rgba(194,65,12,.2);  color: #fdba74; }
  html[data-theme="dark"] .stp-step[data-val="termine"].stp-active      { background: rgba(21,128,61,.2);  color: #86efac; }
  html[data-theme="dark"] .stp-annule.stp-active { background: rgba(185,28,28,.22); color: #fca5a5; }

  /* ─ Responsive ─ */
  @media (max-width: 640px) {
    .stp-step .stp-label, .stp-annule .stp-label { display: none; }
    .stp-step { padding: 8px 6px; }
    .stp-annule { padding: 8px 12px; }
  }

  /* ── Badges mini (liste) ── */
  .badge-statut {
    display: inline-flex; align-items: center; gap: 5px;
    font-size: 10px; font-weight: 600; padding: 2px 8px 2px 6px;
    border-radius: 20px; white-space: nowrap;
  }
  .badge-statut::before { content: ''; flex-shrink: 0; width: 5px; height: 5px; border-radius: 50%; }
  .badge-brouillon  { background: #f3f4f6; color: #6b7280; }
  .badge-brouillon::before  { background: #9ca3af; }
  .badge-en-attente { background: #eff6ff; color: #1d4ed8; }
  .badge-en-attente::before { background: #3b82f6; }
  .badge-en-cours   { background: rgba(var(--amber-rgb),.14); color: #b07d00; }
  .badge-en-cours::before   { background: var(--amber); }
  .badge-termine    { background: rgba(var(--green-rgb),.12); color: var(--green); }
  .badge-termine::before    { background: var(--green); }
  .badge-annule     { background: rgba(var(--rose-rgb),.1); color: var(--rose); }
  .badge-annule::before     { background: var(--rose); }

  html[data-theme="dark"] .badge-brouillon  { background: rgba(107,114,128,.2);  color: #d1d5db; }
  html[data-theme="dark"] .badge-brouillon::before  { background: #9ca3af; }
  html[data-theme="dark"] .badge-en-attente { background: rgba(59,130,246,.2);   color: #93c5fd; }
  html[data-theme="dark"] .badge-en-attente::before { background: #3b82f6; }
  html[data-theme="dark"] .badge-en-cours   { background: rgba(var(--amber-rgb),.2);    color: #e2c16a; }
  html[data-theme="dark"] .badge-en-cours::before   { background: #e2c16a; }
  html[data-theme="dark"] .badge-termine    { background: rgba(var(--green-rgb),.25);    color: #6eddb0; }
  html[data-theme="dark"] .badge-termine::before    { background: #6eddb0; }
  html[data-theme="dark"] .badge-annule     { background: rgba(var(--rose-rgb),.2);    color: #f09090; }
  html[data-theme="dark"] .badge-annule::before     { background: #f09090; }
</style>
