{% extends 'base.html' %}
{% load i18n %}
{% block topbar_title %}Facturation{% endblock %}

{% block extra_css %}
{{ block.super }}
<style>
  .content { padding-top: 0 !important; }
  .breadcrumb { display: none !important; }
</style>
<script>
  (function () {
    function syncTopbarH() {
      var topbar = document.querySelector('.topbar');
      if (topbar) {
        document.documentElement.style.setProperty('--topbar-h', topbar.getBoundingClientRect().height + 'px');
      }
    }
    if (document.readyState === 'loading') {
      document.addEventListener('DOMContentLoaded', syncTopbarH);
    } else {
      syncTopbarH();
    }
    window.addEventListener('resize', syncTopbarH);
  })();
</script>
{% endblock %}

{% block module_navbar %}
<nav class="o-nav">
  <a href="{% url 'dashboard' %}" class="o-nav-grid" title="Accueil">
    <i class="bi bi-grid-3x3-gap-fill"></i>
  </a>
  <span class="o-nav-brand">
    <i class="bi bi-receipt"></i>
    Facturation
  </span>
  <a href="{% url 'facturation:list' %}" class="o-nav-link {% if request.resolver_match.url_name == 'list' or request.resolver_match.url_name == 'create' or request.resolver_match.url_name == 'edit' %}active{% endif %}">Factures</a>
</nav>
{% endblock %}

{% block breadcrumb %}{% endblock %}
