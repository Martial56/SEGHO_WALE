<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500&display=swap');

  :root {
    --primary:      #1a6d8c;
    --primary-dark: #145770;
    --accent:       #2188ab;
    --bg:           #f4f8fb;
    --surface:      #ffffff;
    --border:       #d9d9d9;
    --text:         #0d2a3f;
    --text-muted:   #6c757d;

    /* Palette teal présence */
    --pr-950: #071e28; --pr-900: #0d3040; --pr-800: #0f4358;
    --pr-700: #145770; --pr-600: #1a6d8c; --pr-500: #2188ab;
    --pr-400: #34a8cc; --pr-300: #6ecae3; --pr-200: #aae1f2;
    --pr-100: #d6f3fb; --pr-50:  #eef9fd;
    --pr-surface: #ffffff;
    --pr-border:  rgba(26,109,140,0.14);
    --pr-text:    #0d2a3f;
    --pr-muted:   rgba(0,0,0,0.45);
  }

  html[data-theme="dark"] {
    --bg:       #071e28;
    --surface:  #0d2035;
    --border:   #1a3550;
    --text:     #cce8f4;
    --text-muted: #6a8fa8;

    --pr-50:      #071e28; --pr-100:     #0d2035;
    --pr-surface: #0d2035;
    --pr-border:  rgba(52,168,204,0.18);
    --pr-text:    #cce8f4;
    --pr-muted:   rgba(255,255,255,0.4);
  }

  *, *::before, *::after { box-sizing: border-box; }
  body { font-family: 'Roboto', sans-serif; background: var(--bg) !important; color: var(--text); }
  html { background: var(--bg) !important; }

  .topbar  { position: fixed !important; top: 0 !important; left: 0 !important; right: 0 !important; z-index: 201 !important; }
  .breadcrumb { display: none !important; }
  .content { padding: 0 !important; overflow-x: hidden; }

  /* Messages Django */
  .content > .alert {
    margin: 0; border-radius: 0; border-left-width: 4px;
    font-size: 13px; padding: 10px 20px;
    border-bottom: 1px solid rgba(0,0,0,.06);
  }

  /* ── Module nav ── */
  .module-nav {
    background: var(--primary-dark);
    display: flex; align-items: center;
    padding: 0 32px; height: 44px;
    box-shadow: 0 2px 6px rgba(0,0,0,.18);
    position: sticky; top: 0; z-index: 200;
  }
  .module-nav-brand {
    display: flex; align-items: center; gap: 8px;
    color: #fff; font-weight: 700; font-size: 14px;
    padding-right: 20px; border-right: 1px solid rgba(255,255,255,.2);
    margin-right: 4px; flex-shrink: 0;
  }
  .module-nav-links { display: flex; align-items: center; height: 100%; }
  .module-nav-link {
    color: rgba(255,255,255,.82); text-decoration: none;
    padding: 0 16px; height: 100%; display: flex; align-items: center;
    font-size: 13px; font-weight: 500; border: none;
    background: none; cursor: pointer;
    transition: background .15s, color .15s;
    white-space: nowrap; font-family: 'Roboto', sans-serif; gap: 5px;
  }
  .module-nav-link:hover  { background: rgba(255,255,255,.12); color: #fff; }
  .module-nav-link.active { background: rgba(0,0,0,.25); color: #fff; font-weight: 600; }
  .module-nav-link-right  { margin-left: auto; }
  html[data-theme="dark"] .module-nav { background: #0a1e2e; border-bottom: 1px solid rgba(255,255,255,.06); }
  html[data-theme="dark"] .module-nav-brand { border-right-color: rgba(255,255,255,.1); }

  /* ── Subheader ── */
  .o-subheader {
    background: var(--surface); border-bottom: 1px solid var(--border);
    padding: 6px 16px; display: flex; flex-direction: column; gap: 5px;
  }
  .o-subheader-row { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
  .o-page-title { font-size: 17px; font-weight: 400; color: var(--text); }
  .o-page-count { font-size: 12px; color: var(--text-muted); font-weight: 400; margin-left: 3px; }
  html[data-theme="dark"] .o-subheader { background: var(--surface); border-bottom-color: var(--border); }

  /* ── Pr-subheader (sticky sous le module-nav) ── */
  .pr-subheader {
    display: flex; align-items: center; justify-content: space-between; gap: 16px;
    padding: 10px 20px; flex-wrap: wrap;
    background: var(--surface); border-bottom: 1px solid var(--border);
    box-shadow: 0 2px 8px rgba(0,0,0,.04);
  }
  html[data-theme="dark"] .pr-subheader { background: var(--surface); border-bottom-color: var(--border); }

  /* ── Boutons ── */
  .btn-pr {
    background: var(--primary); color: #fff; border: none; border-radius: 6px;
    padding: 7px 16px; font-size: 13px; font-weight: 500; cursor: pointer;
    text-decoration: none; display: inline-flex; align-items: center; gap: 6px;
    transition: background .15s; font-family: 'Roboto', sans-serif;
  }
  .btn-pr:hover { background: var(--primary-dark); color: #fff; }
  .btn-pr-outline {
    border: 1.5px solid var(--primary); color: var(--primary); background: transparent;
    border-radius: 6px; padding: 6px 14px; font-size: 13px; font-weight: 500;
    cursor: pointer; text-decoration: none; display: inline-flex; align-items: center; gap: 6px;
    transition: background .15s, color .15s; font-family: 'Roboto', sans-serif;
  }
  .btn-pr-outline:hover { background: var(--primary); color: #fff; }
  .btn-pr-sm {
    border: 1px solid var(--pr-400); color: var(--primary); background: transparent;
    border-radius: 4px; padding: 3px 9px; font-size: 12px; font-weight: 500;
    cursor: pointer; text-decoration: none; display: inline-flex; align-items: center; gap: 4px;
    transition: background .15s, color .15s; font-family: 'Roboto', sans-serif;
  }
  .btn-pr-sm:hover { background: var(--primary); color: #fff; }

  /* Bouton créer standard */
  .o-btn-create {
    background: var(--accent); color: #fff; border: none;
    padding: 5px 14px; border-radius: 4px; font-size: 12.5px; font-weight: 500;
    font-family: 'Roboto', sans-serif; cursor: pointer; text-decoration: none;
    display: inline-flex; align-items: center; gap: 5px;
    letter-spacing: .5px; transition: background .15s; white-space: nowrap;
  }
  .o-btn-create:hover { background: var(--primary-dark); }

  /* Bouton contrôle */
  .o-ctrl-btn {
    background: none; border: 1px solid transparent; border-radius: 4px;
    padding: 4px 8px; font-size: 12px; font-family: 'Roboto', sans-serif;
    color: var(--text-muted); cursor: pointer;
    display: flex; align-items: center; gap: 4px;
    transition: border-color .15s, color .15s, background .15s;
    white-space: nowrap; text-decoration: none;
  }
  .o-ctrl-btn:hover { border-color: var(--border); color: var(--text); background: #f3f3f3; }
  .o-ctrl-btn.active { border-color: #aaa; color: var(--text); background: #efefef; }
  html[data-theme="dark"] .o-ctrl-btn:hover { background: #1a2e42; color: var(--text); border-color: var(--border); }

  /* ── Card ── */
  .pr-card {
    background: var(--surface); border-radius: 10px;
    box-shadow: 0 1px 4px rgba(0,0,0,.08); overflow: hidden; margin-bottom: 20px;
    border: 1px solid var(--border);
  }
  .pr-card-header {
    padding: 12px 18px; border-bottom: 1px solid var(--border);
    display: flex; align-items: center; justify-content: space-between; gap: 12px;
    background: var(--surface);
  }
  .pr-card-title {
    font-size: 13.5px; font-weight: 600; color: var(--text);
    display: flex; align-items: center; gap: 8px;
    border-left: 3px solid var(--primary); padding-left: 10px;
  }
  .pr-card-body { padding: 18px; }
  html[data-theme="dark"] .pr-card { background: var(--surface); border-color: var(--border); }
  html[data-theme="dark"] .pr-card-header { background: var(--surface); border-bottom-color: var(--border); }

  /* ── Input ── */
  .pr-input {
    width: 100%; padding: 7px 10px;
    border: 1px solid var(--border); border-radius: 5px;
    font-family: 'Roboto', sans-serif; font-size: 13px; color: var(--text);
    background: var(--surface); transition: border-color .18s, box-shadow .18s;
  }
  .pr-input:focus {
    outline: none; border-color: var(--primary);
    box-shadow: 0 0 0 3px rgba(26,109,140,.12);
  }
  html[data-theme="dark"] .pr-input { background: var(--surface); border-color: var(--border); color: var(--text); }
  .pr-label {
    display: block; font-size: 11px; font-weight: 600; color: var(--text-muted);
    text-transform: uppercase; letter-spacing: .4px; margin-bottom: 4px;
  }

  /* ── Tableau ── */
  .o-list-wrap { background: var(--bg); overflow-x: auto; }
  .o-list-table { width: 100%; border-collapse: collapse; background: var(--surface); }
  .o-list-table th {
    padding: 7px 8px; text-align: left; font-size: 10.5px; font-weight: 600;
    color: var(--text-muted); border-bottom: 1px solid var(--border);
    background: var(--surface); white-space: nowrap;
  }
  .o-list-table td {
    padding: 7px 8px; font-size: 12px; border-bottom: 1px solid #f0f0f0;
    color: var(--text);
  }
  .o-list-table tr:last-child td { border-bottom: none; }
  .o-list-table tbody tr:hover td { background: rgba(26,109,140,.04); }
  html[data-theme="dark"] .o-list-table th { background: var(--surface); border-bottom-color: var(--border); }
  html[data-theme="dark"] .o-list-table td { border-bottom-color: rgba(255,255,255,.04); }
  html[data-theme="dark"] .o-list-table tbody tr:hover td { background: rgba(255,255,255,.03); }

  /* ── Badges statut ── */
  .badge-present  { background: #e3f5ef; color: #1a5c4a; border-radius: 20px; padding: 2px 9px; font-size: 11px; font-weight: 600; }
  .badge-absent   { background: #fde8e8; color: #b91c1c; border-radius: 20px; padding: 2px 9px; font-size: 11px; font-weight: 600; }
  .badge-conge    { background: #fff8e1; color: #b07d00; border-radius: 20px; padding: 2px 9px; font-size: 11px; font-weight: 600; }
  html[data-theme="dark"] .badge-present { background: rgba(26,92,74,.3); color: #6eddb0; }
  html[data-theme="dark"] .badge-absent  { background: rgba(185,28,28,.2); color: #fca5a5; }
  html[data-theme="dark"] .badge-conge   { background: rgba(176,125,0,.2); color: #fde68a; }

  /* ── Stat cards ── */
  .stats-row {
    display: grid; grid-template-columns: repeat(4, 1fr); gap: 0;
    border-bottom: 1px solid var(--border); background: var(--surface);
  }
  .stat-box {
    padding: 12px 18px; border-right: 1px solid var(--border);
    display: flex; align-items: center; gap: 12px;
  }
  .stat-box:last-child { border-right: none; }
  .stat-icon {
    width: 36px; height: 36px; border-radius: 8px;
    display: flex; align-items: center; justify-content: center;
    font-size: 16px; flex-shrink: 0;
  }
  .stat-icon.blue   { background: #e3eef8; color: #1a5482; }
  .stat-icon.green  { background: #e3f5ef; color: #1a5c4a; }
  .stat-icon.yellow { background: #fff8e1; color: #b07d00; }
  .stat-icon.red    { background: #fde8e8; color: #b91c1c; }
  .stat-icon.teal   { background: #e0f4fb; color: #1a6d8c; }
  .stat-label { font-size: 11px; color: var(--text-muted); margin-bottom: 2px; }
  .stat-value { font-size: 22px; font-weight: 700; color: var(--text); line-height: 1.1; }
  html[data-theme="dark"] .stat-box { border-right-color: var(--border); }
  html[data-theme="dark"] .stats-row { background: var(--surface); border-bottom-color: var(--border); }
  html[data-theme="dark"] .stat-icon.blue   { background: rgba(26,84,130,.25);  color: #7ab4d8; }
  html[data-theme="dark"] .stat-icon.green  { background: rgba(26,92,74,.25);   color: #6eddb0; }
  html[data-theme="dark"] .stat-icon.yellow { background: rgba(176,125,0,.2);   color: #fde68a; }
  html[data-theme="dark"] .stat-icon.red    { background: rgba(185,28,28,.2);   color: #fca5a5; }
  html[data-theme="dark"] .stat-icon.teal   { background: rgba(26,109,140,.25); color: #6ecae3; }
  @media (max-width: 800px) {
    .stats-row { grid-template-columns: repeat(2, 1fr); }
    .stat-box:nth-child(2) { border-right: none; }
    .stat-box:nth-child(3) { border-right: 1px solid var(--border); }
  }

  /* ── Pagination ── */
  .o-pagination-bottom {
    display: flex; align-items: center; gap: 6px; justify-content: center;
    padding: 14px 0; border-top: 1px solid var(--border);
    font-size: 12px; color: var(--text-muted);
  }
  .o-pag-btn {
    width: 24px; height: 24px; border: 1px solid var(--border); border-radius: 3px;
    background: var(--surface); display: flex; align-items: center; justify-content: center;
    color: var(--text-muted); text-decoration: none; font-size: 12px; cursor: pointer;
    transition: background .15s, color .15s;
  }
  .o-pag-btn:hover { background: var(--primary); color: #fff; border-color: var(--primary); }
  .o-pag-btn.disabled { opacity: .35; pointer-events: none; }

  /* ── Zone vide ── */
  .o-empty { text-align: center; padding: 60px 20px; color: var(--text-muted); font-size: 13px; }
  .o-empty i { font-size: 36px; display: block; margin-bottom: 10px; opacity: .5; }

  /* ── Barre de recherche ── */
  .o-search-bar {
    display: flex; align-items: center; border: none;
    border-bottom: 1px solid #bbb; background: transparent;
    min-height: 28px; padding: 2px 4px; gap: 4px; width: 260px;
  }
  .o-search-input {
    border: none; outline: none; font-size: 12px; font-family: 'Roboto', sans-serif;
    color: var(--text); flex: 1; min-width: 60px; background: transparent;
  }
  .o-search-btn { background: none; border: none; cursor: pointer; color: var(--text-muted); font-size: 13px; padding: 2px; }
  html[data-theme="dark"] .o-search-bar { border-bottom-color: #2a3e55; }
  html[data-theme="dark"] .o-search-input { color: var(--text); }
</style>
<script>
  document.addEventListener('DOMContentLoaded', function () {
    function adjustOffsets() {
      var topbar  = document.querySelector('.topbar');
      var content = document.querySelector('.content');
      if (topbar && content)
        content.style.setProperty('padding-top', topbar.offsetHeight + 'px', 'important');
    }
    adjustOffsets();
    window.addEventListener('resize', adjustOffsets);
  });
</script>
