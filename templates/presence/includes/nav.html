{% with uname=request.resolver_match.url_name %}
<nav class="o-nav">
  <a href="{% url 'dashboard' %}" class="o-nav-grid" title="Accueil">
    <i class="bi bi-grid-3x3-gap-fill"></i>
  </a>
  <span class="o-nav-brand">
    <i class="bi bi-calendar-check-fill"></i>
    Présence
  </span>

  <a href="{% url 'presence_registre' %}"
     class="o-nav-link {% if uname == 'presence_registre' %}active{% endif %}">

  </a>

  <a href="{% url 'presence_recap' %}"
     class="o-nav-link {% if uname == 'presence_recap' %}active{% endif %}">

  </a>

  <a href="{% url 'presence_stats' %}"
     class="o-nav-link {% if uname == 'presence_stats' %}active{% endif %}">
    Statistiques
  </a>

  <a href="{% url 'presence_rapport' %}"
     class="o-nav-link {% if uname == 'presence_rapport' %}active{% endif %}">
    Rapport
  </a>

  <a href="{% url 'presence_parametres' %}"
     class="o-nav-link {% if uname == 'presence_parametres' %}active{% endif %}">
    Paramètres
  </a>

  <div style="flex:1;"></div>

  {% if can_manage %}
  <a href="{% url 'presence_pointage' %}"
     class="o-nav-link" style="border-left:1px solid rgba(0,0,0,.08); padding-left:16px;">
    <i class="bi bi-qr-code-scan" style="font-size:12px;"></i> Kiosque pointage
  </a>
  {% endif %}

</nav>
