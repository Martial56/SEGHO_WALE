{% extends 'base.html' %}
{% load i18n static %}
{% block topbar_title %}Médecins{% endblock %}

{% block breadcrumb %}
<nav class="o-nav">
  <a href="{% url 'dashboard' %}" class="o-nav-grid" title="Accueil">
    <i class="bi bi-grid-3x3-gap-fill"></i>
  </a>
  <span class="o-nav-brand">
    <i class="bi bi-person-badge-fill"></i>
    Médecins
  </span>
  <a href="{% url 'medecin_dashboard' %}"
     class="o-nav-link {% if request.resolver_match.url_name == 'medecin_dashboard' %}active{% endif %}">
    <i class="bi bi-graph-up" style="font-size:12px;"></i> Tableau de bord
  </a>
  <a href="{% url 'medecins_list' %}"
     class="o-nav-link {% if request.resolver_match.url_name in 'medecins_list,medecin_edit,medecin_create,medecin_detail' %}active{% endif %}">
    Médecins
  </a>
  {% if request.user.is_staff %}
  <div class="o-nav-dropdown">
    <button type="button"
      class="o-nav-link {% if request.resolver_match.url_name in 'medecins_specialites,medecins_specialite_detail,medecins_specialite_create,medecins_specialite_edit,medecins_departements,medecins_departement_detail,medecins_departement_create,medecins_departement_edit' %}active{% endif %}"
      style="background:none;border:none;cursor:pointer;font-family:inherit;display:flex;align-items:center;gap:4px;"
      onclick="toggleMedNavDropdown(event, this)">
      Configuration
      <i class="bi bi-chevron-down" style="font-size:10px;"></i>
    </button>
    <div class="o-nav-dropdown-menu" id="med-nav-config-dropdown">
      <a href="{% url 'medecins_specialites' %}"><i class="bi bi-tag"></i> Spécialités</a>
      <a href="{% url 'medecins_departements' %}"><i class="bi bi-building"></i> Départements</a>
    </div>
  </div>
  {% endif %}
</nav>
<script>
function toggleMedNavDropdown(e, btn) {
  e.stopPropagation();
  var menu = document.getElementById('med-nav-config-dropdown');
  menu.classList.toggle('open');
  if (menu.classList.contains('open')) {
    function close(ev) {
      if (!btn.closest('.o-nav-dropdown').contains(ev.target)) {
        menu.classList.remove('open');
        document.removeEventListener('click', close);
      }
    }
    setTimeout(function () { document.addEventListener('click', close); }, 0);
  }
}
</script>
{% endblock %}

{% block extra_css %}
<link rel="stylesheet" href="{% static 'vendor/bootstrap-icons/bootstrap-icons.min.css' %}">
<style>
/* ── Module nav ── */
.o-nav {
  background:var(--surface,#fff); border-bottom:1px solid rgba(0,0,0,.07);
  margin:-32px -32px 0; padding:0 32px;
  display:flex; align-items:stretch; height:44px;
  position:sticky; top:var(--topbar-h); z-index:250;
  gap:2px;
}
html[data-theme="dark"] .o-nav { background:var(--surface); border-bottom-color:rgba(255,255,255,.08); }
.o-nav-grid {
  padding:0 12px; display:flex; align-items:center; color:rgba(0,0,0,.35);
  text-decoration:none; font-size:17px; flex-shrink:0;
  border-bottom:3px solid transparent; transition:color .15s,background .15s;
}
.o-nav-grid:hover { color:var(--md-600,#4a6741); background:rgba(58,89,36,.06); }
html[data-theme="dark"] .o-nav-grid { color:rgba(255,255,255,.3); }
html[data-theme="dark"] .o-nav-grid:hover { color:rgba(255,255,255,.6); }
.o-nav-brand {
  display:inline-flex; align-items:center; gap:6px; padding:0 14px 0 8px;
  font-size:13px; font-weight:700; color:var(--md-600,#4a6741);
  border-right:1px solid rgba(0,0,0,.08); margin-right:4px; white-space:nowrap; flex-shrink:0;
}
html[data-theme="dark"] .o-nav-brand { color:var(--md-300,#9ab88a); border-right-color:rgba(255,255,255,.08); }
.o-nav-link {
  padding:0 14px; font-size:12.5px; font-weight:500; color:rgba(0,0,0,.45);
  text-decoration:none; display:inline-flex; align-items:center; gap:6px;
  border-bottom:3px solid transparent; transition:color .15s,background .15s,border-color .15s;
  white-space:nowrap; height:44px;
}
.o-nav-link:hover { color:var(--md-700,#3a5924); background:rgba(58,89,36,.06); }
.o-nav-link.active { color:var(--md-700,#3a5924); font-weight:700; border-bottom-color:var(--md-600,#4a6741); background:rgba(58,89,36,.07); }
html[data-theme="dark"] .o-nav-link { color:rgba(255,255,255,.35); }
html[data-theme="dark"] .o-nav-link:hover,
html[data-theme="dark"] .o-nav-link.active { color:var(--md-300,#9ab88a); background:rgba(154,184,138,.07); border-bottom-color:var(--md-400,#7a9b68); }
.o-nav-dropdown { position:relative; height:44px; display:flex; align-items:center; }
.o-nav-dropdown-menu {
  display:none; position:absolute; top:calc(100% + 1px); left:0;
  background:var(--surface,#fff); border-radius:8px;
  box-shadow:0 6px 20px rgba(0,0,0,.13); min-width:190px; z-index:9999;
  overflow:hidden; border:1px solid rgba(0,0,0,.08);
}
.o-nav-dropdown-menu.open { display:block; }
.o-nav-dropdown-menu a {
  display:flex; align-items:center; gap:8px; padding:10px 14px;
  font-size:13px; color:var(--text,#1b2e13); text-decoration:none;
  border-bottom:1px solid rgba(0,0,0,.05); transition:background .12s;
}
.o-nav-dropdown-menu a:last-child { border-bottom:none; }
.o-nav-dropdown-menu a:hover { background:rgba(58,89,36,.06); }
html[data-theme="dark"] .o-nav-dropdown-menu { background:var(--surface); border-color:rgba(255,255,255,.08); }
html[data-theme="dark"] .o-nav-dropdown-menu a { color:var(--text); border-bottom-color:rgba(255,255,255,.06); }
</style>
<style>
  /* ── Subheader & layout ── */
  .o-subheader { background: var(--surface); border-bottom: 1px solid var(--border); padding: 6px 32px; margin: 0 -32px; display: flex; flex-direction: column; gap: 5px; }
  .o-subheader-row { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
  .o-page-title { font-size: 17px; font-weight: 400; color: var(--text); }
  .o-page-count { font-size: 12px; color: var(--text-muted); font-weight: 400; margin-left: 3px; }
  html[data-theme="dark"] .o-subheader { background: var(--surface); border-bottom-color: var(--border); }
  .o-btn-create { background: var(--accent); color: #fff; border: none; padding: 5px 14px; border-radius: 4px; font-size: 12.5px; font-weight: 500; cursor: pointer; text-decoration: none; display: inline-flex; align-items: center; gap: 5px; transition: background .15s; white-space: nowrap; }
  .o-btn-create:hover { background: var(--primary); color: #fff; }
  .o-search-bar { display: flex; align-items: center; border: none; border-bottom: 1px solid #bbb; background: transparent; min-height: 28px; padding: 2px 4px; gap: 4px; width: 280px; }
  .o-search-input { border: none; outline: none; font-size: 12px; color: var(--text); flex: 1; min-width: 60px; background: transparent; }
  .o-search-btn { background: none; border: none; cursor: pointer; color: var(--text-muted); font-size: 13px; padding: 2px; }
  html[data-theme="dark"] .o-search-input { color: var(--text); }
  html[data-theme="dark"] .o-search-bar { border-bottom-color: #3a4a62; }
  .o-ctrl-btn { background: none; border: 1px solid transparent; border-radius: 4px; padding: 4px 8px; font-size: 12px; color: var(--text-muted); cursor: pointer; display: inline-flex; align-items: center; gap: 4px; transition: border-color .15s, color .15s, background .15s; text-decoration: none; white-space: nowrap; }
  .o-ctrl-btn:hover { border-color: var(--border); color: var(--text); background: rgba(0,0,0,.04); }
  html[data-theme="dark"] .o-ctrl-btn:hover { background: #201d1d; color: var(--text); border-color: var(--border); }
  .o-ctrl-sep { width: 1px; height: 18px; background: var(--border); margin: 0 3px; flex-shrink: 0; }
  .o-filter-tag { display: inline-flex; align-items: center; gap: 3px; background: #eef5e4; color: var(--primary); border: 1px solid #bcd5a8; border-radius: 3px; padding: 1px 6px; font-size: 11.5px; font-weight: 500; white-space: nowrap; }
  .o-filter-tag a { color: #888; text-decoration: none; font-size: 14px; line-height: 1; margin-left: 2px; }
  .o-filter-tag a:hover { color: #333; }
  .o-view-btns { display: flex; border: 1px solid var(--border); border-radius: 3px; overflow: hidden; }
  .o-view-btn { width: 26px; height: 24px; border: none; background: var(--surface); display: flex; align-items: center; justify-content: center; color: var(--text-muted); font-size: 13px; cursor: pointer; transition: background .15s, color .15s; }
  .o-view-btn:not(:last-child) { border-right: 1px solid var(--border); }
  .o-view-btn.active, .o-view-btn:hover { background: var(--primary); color: #fff; }
  html[data-theme="dark"] .o-view-btns { border-color: var(--border); }
  html[data-theme="dark"] .o-view-btn { background: var(--surface); color: var(--text-muted); }
  .o-pagination-bottom { display: flex; align-items: center; gap: 6px; justify-content: center; padding: 14px 0; border-top: 1px solid var(--border); font-size: 12px; color: var(--text-muted); }
  .o-pag-btn { width: 24px; height: 24px; border: 1px solid var(--border); border-radius: 3px; background: var(--surface); display: flex; align-items: center; justify-content: center; color: var(--text-muted); text-decoration: none; font-size: 12px; cursor: pointer; transition: background .15s, color .15s; }
  .o-pag-btn:hover { background: var(--primary); color: #fff; border-color: var(--primary); }
  .o-pag-btn.disabled { opacity: .35; pointer-events: none; }
  html[data-theme="dark"] .o-pag-btn { background: var(--surface); border-color: var(--border); color: var(--text-muted); }

  /* ── Table ── */
  .o-list-wrap { background: var(--bg); overflow-x: auto; }
  .o-list-table { width: 100%; border-collapse: collapse; background: var(--surface); }
  .o-list-table th {
    padding: 9px 14px; text-align: left; font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: .5px;
    color: var(--text-muted); border-bottom: 2px solid var(--border);
    background: var(--surface); white-space: nowrap; position: relative; user-select: none;
  }
  .o-list-table td { padding: 10px 14px; font-size: 13px; border-bottom: 1px solid var(--border); color: var(--text); transition: background .1s; }
  .o-list-table tr:last-child td { border-bottom: none; }
  .o-list-table tbody tr { cursor: pointer; }
  .o-list-table tbody tr:hover td { background: rgba(58,89,36,.05); }
  .o-list-table tbody tr:hover .col-accent { border-left-color: var(--accent); }
  .col-accent { border-left: 3px solid transparent; transition: border-color .12s; padding-left: 11px !important; }
  html[data-theme="dark"] .o-list-table th { border-bottom-color: var(--border); color: var(--text-muted); }
  html[data-theme="dark"] .o-list-table td { border-bottom-color: rgba(255,255,255,.06); }
  html[data-theme="dark"] .o-list-table tbody tr:hover td { background: rgba(255,255,255,.04); }

  /* ── Kanban ── */
  .o-kanban { padding: 16px; display: grid; grid-template-columns: repeat(4,1fr); gap: 12px; background: var(--bg); }
  .o-card {
    background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: 16px 16px 14px;
    cursor: pointer; transition: box-shadow .18s, border-color .18s, transform .12s;
    box-shadow: 0 1px 4px rgba(0,0,0,.06); position: relative; overflow: hidden;
  }
  .o-card::after {
    content: ''; position: absolute; top: 0; left: 0; right: 0; height: 3px;
    background: linear-gradient(90deg, var(--accent), #4ab3d8);
    transform: scaleX(0); transform-origin: left; transition: transform .18s;
  }
  .o-card:hover { box-shadow: 0 8px 24px rgba(0,0,0,.12); border-color: var(--accent); transform: translateY(-2px); }
  .o-card:hover::after { transform: scaleX(1); }
  .o-card-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 10px; }
  .o-card-code {
    font-family: monospace; font-size: 10px; font-weight: 700; letter-spacing: .5px;
    color: var(--accent); background: rgba(58,89,36,.1); padding: 3px 8px; border-radius: 5px;
  }
  .o-card-icon { width: 32px; height: 32px; border-radius: 8px; background: rgba(58,89,36,.1); display: flex; align-items: center; justify-content: center; color: var(--accent); font-size: 15px; flex-shrink: 0; }
  .o-card-name { font-size: 14px; font-weight: 600; color: var(--text); margin-bottom: 4px; line-height: 1.3; }
  .o-card-desc { font-size: 12px; color: var(--text-muted); line-height: 1.45; }
  .o-card-footer { margin-top: 10px; padding-top: 8px; border-top: 1px solid var(--border); display: flex; align-items: center; gap: 6px; font-size: 11px; color: var(--text-muted); }
  html[data-theme="dark"] .o-card { border-color: var(--border); }
  html[data-theme="dark"] .o-card:hover { border-color: #4a90d9; }
  html[data-theme="dark"] .o-card-code { background: rgba(58,89,36,.18); }
  html[data-theme="dark"] .o-card-icon { background: rgba(58,89,36,.18); }
  html[data-theme="dark"] .o-card-footer { border-top-color: var(--border); }

  /* ── Badges ── */
  .badge-code {
    display: inline-flex; align-items: center; font-family: monospace; font-size: 11px; font-weight: 700;
    background: rgba(58,89,36,.08); color: var(--primary); padding: 3px 9px; border-radius: 5px; letter-spacing: .3px;
  }
  html[data-theme="dark"] .badge-code { background: rgba(58,89,36,.18); color: #9ab88a; }
  .badge-actif  { display:inline-flex;align-items:center;gap:4px;font-size:11px;padding:2px 8px;border-radius:20px;background:#e3f9ee;color:#0d8a52;font-weight:600; }
  .badge-inactif{ display:inline-flex;align-items:center;gap:4px;font-size:11px;padding:2px 8px;border-radius:20px;background:#fdf0f0;color:#c0392b;font-weight:600; }
  html[data-theme="dark"] .badge-actif  { background:rgba(22,169,107,.2);color:#6eddb0; }
  html[data-theme="dark"] .badge-inactif{ background:rgba(232,69,69,.2);color:#f09090; }

  /* ── Col-picker ── */
  .col-picker-th { width: 30px; text-align: center; padding: 0 2px; position: relative; }
  .col-picker-btn { background: none; border: none; cursor: pointer; color: var(--text-muted); font-size: 15px; padding: 2px 5px; border-radius: 3px; line-height: 1; font-weight: 700; letter-spacing: -1px; }
  .col-picker-btn:hover { background: rgba(0,0,0,.06); color: var(--text); }
  .col-picker-menu { display: none; position: absolute; right: 0; top: calc(100% + 2px); background: var(--surface); border: 1px solid var(--border); border-radius: 8px; box-shadow: 0 8px 24px rgba(0,0,0,.12); z-index: 500; min-width: 170px; padding: 6px 0; }
  .col-picker-menu.open { display: block; }
  .col-picker-menu label { display: flex; align-items: center; gap: 8px; padding: 7px 14px; font-size: 13px; color: var(--text); cursor: pointer; white-space: nowrap; }
  .col-picker-menu label:hover { background: rgba(0,0,0,.03); }
  html[data-theme="dark"] .col-picker-menu { background: var(--surface); border-color: var(--border); }
  html[data-theme="dark"] .col-picker-menu label { color: var(--text); }

  /* ── Bulk bar ── */
  .bulk-bar { display: none; align-items: center; gap: 12px; background: rgba(58,89,36,.07); border-bottom: 1px solid rgba(58,89,36,.18); padding: 9px 32px; margin: 0 -32px; font-size: 13px; font-weight: 600; color: var(--primary); }
  .bulk-bar.visible { display: flex; }
  .btn-bulk-delete { display: flex; align-items: center; gap: 6px; padding: 5px 13px; background: #dc2626; color: #fff; border: none; border-radius: 5px; font-size: 12px; font-weight: 700; cursor: pointer; transition: background .15s; }
  .btn-bulk-delete:hover { background: #b91c1c; }
  .btn-bulk-cancel { padding: 5px 11px; background: transparent; border: 1px solid rgba(0,0,0,.15); border-radius: 5px; font-size: 12px; font-weight: 600; cursor: pointer; color: var(--primary); transition: background .12s; }
  .btn-bulk-cancel:hover { background: rgba(0,0,0,.04); }
  html[data-theme="dark"] .bulk-bar { background: rgba(58,89,36,.12); border-color: rgba(58,89,36,.25); color: #9ab88a; }
  html[data-theme="dark"] .btn-bulk-cancel { border-color: rgba(255,255,255,.15); color: #9ab88a; }

  /* ── Modal ── */
  .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,.45); z-index: 9000; align-items: center; justify-content: center; backdrop-filter: blur(2px); }
  .modal-overlay.open { display: flex; }
  .modal-box { background: var(--surface); border-radius: 12px; padding: 32px 28px; max-width: 400px; width: 90%; box-shadow: 0 24px 64px rgba(0,0,0,.22); text-align: center; }
  .modal-icon { font-size: 40px; margin-bottom: 12px; }
  .modal-title { font-size: 16px; font-weight: 700; color: var(--text); margin-bottom: 8px; }
  .modal-msg { font-size: 13px; color: var(--text-muted); margin-bottom: 24px; line-height: 1.55; }
  .modal-actions { display: flex; gap: 10px; justify-content: center; }
  .btn-modal-cancel { padding: 9px 22px; border-radius: 6px; border: 1px solid var(--border); background: var(--surface); color: var(--text-muted); font-size: 13px; font-weight: 600; cursor: pointer; transition: background .12s; }
  .btn-modal-cancel:hover { background: rgba(0,0,0,.04); }
  .btn-modal-confirm { padding: 9px 22px; border-radius: 6px; border: none; background: #dc2626; color: #fff; font-size: 13px; font-weight: 700; cursor: pointer; transition: background .15s; }
  .btn-modal-confirm:hover { background: #b91c1c; }

  /* ── Empty state ── */
  .o-empty-state { display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 80px 20px; text-align: center; }
  .o-empty-state .empty-icon { font-size: 52px; margin-bottom: 16px; opacity: .3; color: var(--text-muted); }
  .o-empty-state .empty-title { font-size: 15px; font-weight: 600; color: var(--text); margin-bottom: 6px; }
  .o-empty-state .empty-sub { font-size: 13px; color: var(--text-muted); margin-bottom: 20px; }

  /* ── Responsive ── */
  @media (max-width:1100px) { .o-kanban { grid-template-columns: repeat(3,1fr); } }
  @media (max-width:720px)  { .o-kanban { grid-template-columns: repeat(2,1fr); } }
  @media (max-width:440px)  { .o-kanban { grid-template-columns: 1fr; } }
  @media (max-width:1024px) {
    .o-subheader { margin: 0 -20px; padding-left: 20px; padding-right: 20px; }
    .bulk-bar    { margin: 0 -20px; padding-left: 20px; padding-right: 20px; }
  }
</style>
<style>
  .content { padding-top: 0 !important; }
  .breadcrumb { display: none !important; }
</style>
<script>
  (function () {
    function syncTopbarH() {
      var topbar = document.querySelector('.topbar');
      if (topbar) {
        document.documentElement.style.setProperty('--topbar-h', topbar.getBoundingClientRect().height + 'px');
      }
    }
    if (document.readyState === 'loading') {
      document.addEventListener('DOMContentLoaded', syncTopbarH);
    } else {
      syncTopbarH();
    }
    window.addEventListener('resize', syncTopbarH);
  })();
</script>
{% endblock %}
