{% with uname=request.resolver_match.url_name %}
<nav class="o-nav">
  <a href="{% url 'dashboard' %}" class="o-nav-grid" title="Accueil">
    <i class="bi bi-grid-3x3-gap-fill"></i>
  </a>
  <span class="o-nav-brand">
    <i class="bi bi-people-fill"></i>
    Employés
  </span>

  <a href="{% url 'rh_dashboard' %}"
     class="o-nav-link {% if uname == 'rh_dashboard' %}active{% endif %}">
    Tableau de bord
  </a>

  <a href="{% url 'ressources_humaines_list' %}"
     class="o-nav-link {% if uname == 'ressources_humaines_list' or uname == 'rh_detail' or uname == 'rh_modifier' %}active{% endif %}">
    Employés
  </a>

  <a href="{% url 'rh_annuaire' %}"
     class="o-nav-link {% if uname == 'rh_annuaire' or uname == 'rh_organigramme' %}active{% endif %}">
    Annuaire
  </a>

  <a href="{% url 'rh_registre' %}"
     class="o-nav-link {% if uname == 'rh_registre' %}active{% endif %}">
    Registre
  </a>

  <a href="{% url 'rh_presence_rapport' %}"
     class="o-nav-link {% if 'presence' in uname %}active{% endif %}">
    Présence
  </a>

  {% if can_manage %}
  <div class="o-nav-dropdown">
    <button type="button"
      class="o-nav-link {% if uname == 'rh_config_list' or uname == 'rh_config_create' or uname == 'rh_config_edit' %}active{% endif %}"
      style="background:none;border:none;cursor:pointer;font-family:inherit;display:flex;align-items:center;gap:4px;"
      onclick="toggleRhNavDropdown(event, this)">
      Configuration
      <i class="bi bi-chevron-down" style="font-size:10px;"></i>
    </button>
    <div class="o-nav-dropdown-menu" id="rh-nav-config-dropdown">
      <a href="{% url 'rh_config_list' 'grade' %}"><i class="bi bi-award"></i> Grades</a>
      <a href="{% url 'rh_config_list' 'fonction' %}"><i class="bi bi-briefcase"></i> Fonctions</a>
      <a href="{% url 'rh_config_list' 'type_contrat' %}"><i class="bi bi-file-earmark-text"></i> Types de contrat</a>
      <a href="{% url 'rh_config_list' 'nationalite' %}"><i class="bi bi-flag"></i> Nationalités</a>
    </div>
  </div>
  {% endif %}

  {% if can_manage %}
  <div style="flex:1;"></div>
  <a href="{% url 'rh_nouveau' %}"
     class="o-nav-link {% if uname == 'rh_nouveau' %}active{% endif %}">
    <i class="bi bi-person-plus-fill"></i> Nouvel employé
  </a>
  <a href="{% url 'rh_import' %}"
     class="o-nav-link {% if uname == 'rh_import' %}active{% endif %}">
    <i class="bi bi-upload"></i> Import
  </a>
  {% endif %}
</nav>
<script>
function toggleRhNavDropdown(e, btn) {
  e.stopPropagation();
  var menu = document.getElementById('rh-nav-config-dropdown');
  menu.classList.toggle('open');
  if (menu.classList.contains('open')) {
    function close(ev) {
      if (!btn.closest('.o-nav-dropdown').contains(ev.target)) {
        menu.classList.remove('open');
        document.removeEventListener('click', close);
      }
    }
    setTimeout(function () { document.addEventListener('click', close); }, 0);
  }
}
</script>
{% endwith %}
