<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}SEGHO-WALE{% endblock %}</title>
    <link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;500;600;700;800&family=Lora:ital,wght@0,600;1,400&display=swap" rel="stylesheet">
    <style>
        /* ═══════════════════════════════════════
           TOKENS & RESET
        ═══════════════════════════════════════ */
        *, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }
        :root {
            --teal-950: #071e28; --teal-900: #0d3040; --teal-800: #0f4358;
            --teal-700: #145770; --teal-600: #1a6d8c; --teal-500: #2188ab;
            --teal-400: #34a8cc; --teal-300: #6ecae3; --teal-200: #aae1f2;
            --teal-100: #d6f3fb; --teal-50: #eef9fd;
            --green: #16a96b; --amber: #e89a1a; --rose: #e84545;
            --violet: #7b57c2; --coral: #e66144; --sky: #2d99db;
            --radius: 16px;
            --shadow-sm: 0 2px 8px rgba(0,0,0,0.08);
            --shadow-md: 0 4px 16px rgba(0,0,0,0.1);
            --shadow-lg: 0 8px 32px rgba(0,0,0,0.15);
        }
        html { font-size: 16px; }
        body {
            font-family: 'Sora', sans-serif;
            background: #f0f6fa;
            color: var(--teal-900);
            min-height: 100vh;
            display: flex;
        }

        /* ═══════════════════════════════════════
           MAIN CONTENT
        ═══════════════════════════════════════ */
        .main {
            flex: 1;
            margin-left: 0;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }
        .topbar {
            background: #fff;
            border-bottom: 1px solid rgba(0,0,0,0.06);
            padding: 16px 32px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            box-shadow: var(--shadow-sm);
        }
        .topbar-left {
            display: flex;
            align-items: center;
            gap: 20px;
        }
        .topbar-title {
            font-size: 18px;
            font-weight: 700;
            color: var(--teal-900);
        }
        .topbar-right {
            display: flex;
            align-items: center;
            gap: 24px;
        }
        .topbar-action {
            background: none;
            border: none;
            color: var(--teal-600);
            cursor: pointer;
            font-size: 20px;
            transition: color 0.2s;
        }
        .topbar-action:hover {
            color: var(--teal-500);
        }

        .content {
            flex: 1;
            padding: 32px;
            overflow-y: auto;
        }

        /* ═══════════════════════════════════════
           BREADCRUMB
        ═══════════════════════════════════════ */
        .breadcrumb {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 24px;
            font-size: 14px;
        }
        .breadcrumb a {
            color: var(--teal-500);
            text-decoration: none;
        }
        .breadcrumb a:hover {
            color: var(--teal-400);
        }
        .breadcrumb span {
            color: rgba(0,0,0,0.4);
        }

        /* ═══════════════════════════════════════
           PAGE HEADER
        ═══════════════════════════════════════ */
        .page-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 32px;
            gap: 20px;
        }
        .page-header-left h1 {
            font-size: 28px;
            font-weight: 800;
            color: var(--teal-950);
            margin-bottom: 8px;
        }
        .page-header-left p {
            color: rgba(0,0,0,0.55);
            font-size: 14px;
        }
        .page-header-right {
            display: flex;
            gap: 12px;
        }

        /* ═══════════════════════════════════════
           BUTTONS
        ═══════════════════════════════════════ */
        .btn {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 10px 20px;
            border: none;
            border-radius: 10px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            text-decoration: none;
        }
        .btn-primary {
            background: var(--teal-500);
            color: #fff;
        }
        .btn-primary:hover {
            background: var(--teal-600);
            box-shadow: var(--shadow-md);
        }
        .btn-secondary {
            background: rgba(0,0,0,0.08);
            color: var(--teal-900);
        }
        .btn-secondary:hover {
            background: rgba(0,0,0,0.12);
        }
        .btn-small {
            padding: 8px 14px;
            font-size: 13px;
        }
        .btn-success {
            background: var(--green);
            color: #fff;
        }
        .btn-danger {
            background: var(--rose);
            color: #fff;
        }
        .btn-warning {
            background: var(--amber);
            color: #fff;
        }

        /* ═══════════════════════════════════════
           CARDS & GRIDS
        ═══════════════════════════════════════ */
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 20px;
            margin-bottom: 32px;
        }
        .card {
            background: #fff;
            border-radius: var(--radius);
            padding: 24px;
            box-shadow: var(--shadow-sm);
            transition: box-shadow 0.2s;
        }
        .card:hover {
            box-shadow: var(--shadow-md);
        }
        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 16px;
            gap: 12px;
        }
        .card-title {
            font-size: 16px;
            font-weight: 700;
            color: var(--teal-900);
        }
        .card-meta {
            font-size: 13px;
            color: rgba(0,0,0,0.55);
            margin-top: 8px;
        }
        .card-stat {
            font-size: 28px;
            font-weight: 800;
            color: var(--teal-600);
            margin-top: 12px;
        }
        .card-stat-label {
            font-size: 12px;
            color: rgba(0,0,0,0.6);
            margin-top: 4px;
            text-transform: uppercase;
            letter-spacing: 0.3px;
        }

        /* ═══════════════════════════════════════
           TABLES
        ═══════════════════════════════════════ */
        .table-container {
            background: #fff;
            border-radius: var(--radius);
            overflow: hidden;
            box-shadow: var(--shadow-sm);
        }
        table {
            width: 100%;
            border-collapse: collapse;
        }
        thead {
            background: rgba(0,0,0,0.03);
            border-bottom: 2px solid rgba(0,0,0,0.08);
        }
        th {
            padding: 14px 20px;
            text-align: left;
            font-size: 12px;
            font-weight: 700;
            text-transform: uppercase;
            color: var(--teal-900);
            letter-spacing: 0.3px;
        }
        td {
            padding: 14px 20px;
            border-bottom: 1px solid rgba(0,0,0,0.05);
            font-size: 14px;
        }
        tbody tr:hover {
            background: rgba(0,0,0,0.02);
        }

        /* ═══════════════════════════════════════
           ALERTS
        ═══════════════════════════════════════ */
        .alert {
            padding: 14px 18px;
            border-radius: 10px;
            font-size: 14px;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .alert-success {
            background: rgba(22,169,107,0.1);
            color: #0d5b3d;
            border-left: 4px solid var(--green);
        }
        .alert-error {
            background: rgba(232,69,69,0.1);
            color: #6b1f1f;
            border-left: 4px solid var(--rose);
        }
        .alert-warning {
            background: rgba(232,154,26,0.1);
            color: #6b4a0f;
            border-left: 4px solid var(--amber);
        }
        .alert-info {
            background: rgba(45,153,219,0.1);
            color: #1a4d6d;
            border-left: 4px solid var(--sky);
        }

        /* ═══════════════════════════════════════
           FORMS
        ═══════════════════════════════════════ */
        .form-group {
            margin-bottom: 20px;
        }
        .form-group label {
            display: block;
            font-size: 13px;
            font-weight: 600;
            color: var(--teal-900);
            margin-bottom: 8px;
        }
        .form-group input,
        .form-group textarea,
        .form-group select {
            width: 100%;
            padding: 10px 14px;
            border: 1px solid rgba(0,0,0,0.12);
            border-radius: 8px;
            font-family: 'Sora', sans-serif;
            font-size: 14px;
            transition: border-color 0.2s;
        }
        .form-group input:focus,
        .form-group textarea:focus,
        .form-group select:focus {
            outline: none;
            border-color: var(--teal-500);
            box-shadow: 0 0 0 3px rgba(33,136,171,0.1);
        }

        /* ═══════════════════════════════════════
           BADGES & TAGS
        ═══════════════════════════════════════ */
        .badge {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.2px;
        }
        .badge-primary {
            background: rgba(33,136,171,0.15);
            color: var(--teal-600);
        }
        .badge-success {
            background: rgba(22,169,107,0.15);
            color: var(--green);
        }
        .badge-warning {
            background: rgba(232,154,26,0.15);
            color: var(--amber);
        }
        .badge-danger {
            background: rgba(232,69,69,0.15);
            color: var(--rose);
        }

        /* ═══════════════════════════════════════
           RESPONSIVE
        ═══════════════════════════════════════ */
        @media (max-width: 1024px) {
            .content { padding: 20px; }
            .page-header { flex-direction: column; }
        }
        @media (max-width: 768px) {
            .grid {
                grid-template-columns: 1fr;
            }
            .page-header-right {
                flex-direction: column;
                width: 100%;
            }
        }
    </style>
    {% block extra_css %}{% endblock %}
</head>
<body>
    <div class="main">
        {% include 'includes/topbar.html' %}
        
        <div class="content">
            {% if messages %}
                {% for message in messages %}
                    <div class="alert alert-{{ message.tags|default:'info' }}">
                        <span>{{ message }}</span>
                    </div>
                {% endfor %}
            {% endif %}

            {% block breadcrumb %}{% endblock %}
            {% block content %}{% endblock %}
        </div>
    </div>

    {% block extra_js %}{% endblock %}
</body>
</html>
