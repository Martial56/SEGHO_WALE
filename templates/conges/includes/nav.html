{% with uname=request.resolver_match.url_name %}
<nav class="o-nav">
  <a href="{% url 'dashboard' %}" class="o-nav-grid" title="Accueil">
    <i class="bi bi-grid-3x3-gap-fill"></i>
  </a>
  <span class="o-nav-brand">
    <i class="bi bi-calendar2-check-fill"></i>
    Congés
  </span>

  <a href="{% url 'conge_dashboard' %}"
     class="o-nav-link {% if uname == 'conge_dashboard' %}active{% endif %}">
    <i class="bi bi-graph-up" style="font-size:12px;"></i> Tableau de bord
  </a>

  <a href="{% url 'conge_list' %}"
     class="o-nav-link {% if 'list' in uname or 'detail' in uname or uname == 'conge_nouveau' or 'annuler' in uname or 'terminer' in uname or 'prolonger' in uname or 'fractionner' in uname or 'absence' in uname or 'bon' in uname or 'attestation' in uname or 'employe_info' in uname or uname == 'conge_en_cours' or 'historique' in uname %}active{% endif %}">
    Liste des congés
  </a>

  <a href="{% url 'conge_suivi_retours' %}"
     class="o-nav-link {% if 'retour' in uname %}active{% endif %}">
    Suivi retours
  </a>

  <a href="{% url 'conge_calendrier' %}"
     class="o-nav-link {% if 'calendrier' in uname or 'planning' in uname %}active{% endif %}">
    Calendrier
  </a>

  <div style="flex:1;"></div>

  <div class="cg-more-wrap" id="cg-more-wrap">
    <button class="cg-more-btn" id="cg-more-btn" title="Plus d'options">
      <i class="bi bi-three-dots-vertical"></i>
    </button>
    <div class="cg-more-popup" id="cg-more-popup">
      <a href="{% url 'conge_soldes' %}" class="cg-more-item">
        <i class="bi bi-table"></i> Soldes congés
      </a>
      <a href="{% url 'conge_planning_equipe' %}" class="cg-more-item">
        <i class="bi bi-people-fill"></i> Planning équipe
      </a>
      <a href="{% url 'conge_rapport' %}" class="cg-more-item">
        <i class="bi bi-file-earmark-bar-graph"></i> Rapports
      </a>
      <a href="{% url 'conge_direction' %}" class="cg-more-item">
        <i class="bi bi-graph-up-arrow"></i> Vue direction
      </a>
      <a href="{% url 'conge_export_csv' %}" class="cg-more-item">
        <i class="bi bi-file-earmark-excel"></i> Export CSV
      </a>
    </div>
  </div>

</nav>
{% endwith %}
