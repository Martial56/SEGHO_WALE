{% extends 'rapports/base.html' %}

{% block extra_css %}
{{ block.super }}
<style>
:root { --rap-surface:#fff; --rap-border:#e8edf2; --rap-text:#0d3040; --rap-muted:rgba(0,0,0,.5); }
html[data-theme="dark"] { --rap-surface:#132033; --rap-border:#243044; --rap-text:#d4e6f5; --rap-muted:rgba(255,255,255,.45); }

.rap-wrap { max-width: 1180px; padding: 28px 32px 60px; }

.rap-section { margin-bottom: 30px; }
.rap-section-title {
  font-size: 12.5px; font-weight: 700; text-transform: uppercase; letter-spacing: .06em;
  color: var(--teal-700); display: flex; align-items: center; gap: 8px; margin-bottom: 12px;
}
.rap-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(250px, 1fr)); gap: 14px; }

.rap-card {
  background: var(--rap-surface); border: 1px solid var(--rap-border); border-radius: 10px;
  padding: 16px; display: flex; flex-direction: column; gap: 8px;
  text-decoration: none; color: inherit; transition: box-shadow .15s, border-color .15s, transform .15s;
}
.rap-card:hover { box-shadow: 0 8px 22px rgba(0,0,0,.09); border-color: var(--teal-300); transform: translateY(-2px); }
.rap-card-icon {
  width: 38px; height: 38px; border-radius: 8px; background: var(--teal-50); color: var(--teal-600);
  display: flex; align-items: center; justify-content: center; font-size: 17px;
}
.rap-card-title { font-size: 14px; font-weight: 700; color: var(--rap-text); }
.rap-card-desc { font-size: 12px; color: var(--rap-muted); line-height: 1.4; }
</style>
{% endblock %}

{% block content %}
<div class="rap-wrap">

  {% for categorie in categories %}
  <div class="rap-section">
    <div class="rap-section-title"><i class="bi {{ categorie.icone }}"></i> {{ categorie.nom }}</div>
    <div class="rap-grid">
      {% for rapport in categorie.rapports %}
      <a href="{% url 'rapports:generer' rapport.slug %}" class="rap-card">
        <div class="rap-card-icon"><i class="bi {{ rapport.icone }}"></i></div>
        <div class="rap-card-title">{{ rapport.nom }}</div>
        <div class="rap-card-desc">{{ rapport.description }}</div>
      </a>
      {% endfor %}
    </div>
  </div>
  {% endfor %}

</div>
{% endblock %}
