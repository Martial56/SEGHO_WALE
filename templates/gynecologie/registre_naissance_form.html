{% extends 'gynecologie/base.html' %}
{% load static %}

{% block content %}
<style>
  /* STATUS BAR */
  .f-statusbar {
    display: flex; align-items: center; gap: 0;
    padding: 8px 0 0;
  }
  .f-status-done-btn {
    background: var(--teal-600); color: #fff; border: none;
    padding: 5px 16px; border-radius: 4px; font-size: 12px; font-weight: 500;
    cursor: pointer; margin-right: 16px;
  }
  .f-statusbar-steps { margin-left: auto; display: flex; align-items: center; gap: 0; }
  .f-step {
    padding: 4px 20px; font-size: 12px; color: var(--text-muted);
    position: relative; cursor: pointer;
  }
  .f-step.active {
    background: var(--teal-600); color: #fff;
    clip-path: polygon(0 0, calc(100% - 10px) 0, 100% 50%, calc(100% - 10px) 100%, 0 100%, 10px 50%);
    padding: 4px 24px;
  }
  .f-step.active:first-child { clip-path: polygon(0 0, calc(100% - 10px) 0, 100% 50%, calc(100% - 10px) 100%, 0 100%); }
  html[data-theme="dark"] .f-step { color: var(--text-muted); }
  html[data-theme="dark"] .f-step:not(.active):hover { background: #28304a; }
</style>

<form method="post">
{% csrf_token %}

<div class="action-bar">
  <div class="action-bar-breadcrumb">
    <a href="{% url 'gynecologie_naissances' %}"><i class="bi bi-arrow-left"></i> Registre des naissances</a>
    <span class="sep">/</span>
    <span class="current">Nouveau</span>
  </div>
  <div class="action-bar-buttons">
    <a href="{% url 'gynecologie_naissances' %}" class="btn-form-cancel">Ignorer</a>
    <button type="submit" name="action" value="brouillon" class="btn-form-submit">Sauvegarder</button>
  </div>
</div>

<div class="f-statusbar">
  <button type="submit" name="action" value="termine" class="f-status-done-btn">TERMINÉ</button>
  <div class="f-statusbar-steps">
    <div class="f-step active">BROUILLON</div>
    <div class="f-step">TERMINÉ</div>
  </div>
</div>

{% if error %}
<div class="alert-error" style="margin-top:12px;">
  <i class="bi bi-exclamation-triangle-fill"></i> Erreur lors de la sauvegarde : {{ error }}
</div>
{% endif %}

<!-- FORM -->
<div class="form-simple-card">
  <div class="tab-two-col">

    <!-- Colonne gauche -->
    <div>
      <div class="form-field">
        <label class="field-label">Date de naissance</label>
        <input type="datetime-local" name="date_accouchement" class="field-ul" required>
      </div>
      <div class="form-field">
        <label class="field-label">Lieu de naissance</label>
        <input type="text" name="lieu_naissance" class="field-ul">
      </div>
      <div class="form-field">
        <label class="field-label">Poids à la naissance</label>
        <input type="number" name="poids_naissance" class="field-ul" step="0.01">
      </div>
      <div class="form-field">
        <label class="field-label">Genre</label>
        <select name="sexe_enfant" class="field-ul" required><option value="" disabled selected hidden></option>
          <option value="F">Féminin</option>
          <option value="M">Masculin</option>
        </select>
      </div>
      <div class="form-field">
        <label class="field-label">Groupe sanguin</label>
        <select name="groupe_sanguin_enfant" class="field-ul"><option value="" disabled selected hidden></option>
          <option value="A+">A+</option><option value="A-">A-</option>
          <option value="B+">B+</option><option value="B-">B-</option>
          <option value="AB+">AB+</option><option value="AB-">AB-</option>
          <option value="O+">O+</option><option value="O-">O-</option>
        </select>
      </div>
      <div class="form-field">
        <label class="field-label">Taux d'hémoglobine</label>
        <input type="number" name="taux_hemoglobine" class="field-ul" step="0.01">
      </div>
    </div>

    <!-- Colonne droite -->
    <div>
      <div class="form-field">
        <label class="field-label">Nom de la mère</label>
        <select name="mere" class="field-ul" required><option value="" disabled selected hidden></option>
          {% for p in patients %}
          <option value="{{ p.pk }}">{{ p.nom|upper }} {{ p.prenoms }}</option>
          {% endfor %}
        </select>
      </div>
      <div class="form-field">
        <label class="field-label">Médecin</label>
        <select name="medecin" class="field-ul"><option value="" disabled selected hidden></option>
          {% for m in medecins %}
          <option value="{{ m.pk }}">{{ m }}</option>
          {% endfor %}
        </select>
      </div>
      <div class="form-field">
        <label class="field-label">Statut naissance</label>
        <select name="statut" class="field-ul"><option value="" disabled selected hidden></option>
          <option value="vivant">Vivant</option>
          <option value="mort_ne">Mort-né</option>
        </select>
      </div>
      <div class="form-field">
        <label class="field-label">Nom de l'enfant</label>
        <input type="text" name="nom_enfant" class="field-ul">
      </div>
      <div class="form-field">
        <label class="field-label">Prénoms de l'enfant</label>
        <input type="text" name="prenoms_enfant" class="field-ul">
      </div>
    </div>

  </div>

  <hr style="border:none;border-top:1px solid var(--border);margin:6px 0 18px;">

  <div class="tab-two-col">

    <!-- Section parents -->
    <div>
      <div class="form-field">
        <label class="field-label">Info sur les parents</label>
        <input type="text" name="info_parents" class="field-ul">
      </div>
      <div class="form-field">
        <label class="field-label">Éducation du patient</label>
        <select name="education_mere" class="field-ul"><option value="" disabled selected hidden></option>
          <option value="aucun">Aucun</option>
          <option value="primaire">Primaire</option>
          <option value="secondaire">Secondaire</option>
          <option value="superieur">Supérieur</option>
        </select>
      </div>
      <div class="form-field">
        <label class="field-label">Âge de la mère</label>
        <input type="number" name="age_mere" class="field-ul">
      </div>
      <div class="form-field">
        <label class="field-label">Mode d'accouchement</label>
        <select name="mode_accouchement" class="field-ul"><option value="" disabled selected hidden></option>
          <option value="voie_basse">Voie basse</option>
          <option value="cesarienne">Césarienne</option>
          <option value="forceps">Forceps</option>
          <option value="ventouse">Ventouse</option>
        </select>
      </div>
      <div class="form-field">
        <label class="field-label">Parité</label>
        <input type="number" name="parite" class="field-ul" value="0" min="0">
      </div>
      <div class="form-field">
        <label class="field-label">Garçon(s)</label>
        <input type="number" name="nombre_garcons" class="field-ul" value="0" min="0">
      </div>
      <div class="form-field">
        <label class="field-label">Fille(s)</label>
        <input type="number" name="nombre_filles" class="field-ul" value="0" min="0">
      </div>
    </div>

    <div>
      <div class="form-field">
        <label class="field-label">Remarques</label>
        <textarea name="remarques" class="field-ul" rows="6"></textarea>
      </div>
    </div>

  </div>
</div>

</form>
{% endblock %}
