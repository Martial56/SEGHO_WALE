{% with uname=request.resolver_match.url_name %}
<nav class="o-nav">
  <a href="{% url 'dashboard' %}" class="o-nav-grid" title="Accueil">
    <i class="bi bi-grid-3x3-gap-fill"></i>
  </a>
  <span class="o-nav-brand">
    <i class="bi bi-gender-female"></i>
    Gynécologie
  </span>

  <a href="{% url 'gynecologie_list' %}"
     class="o-nav-link {% if uname == 'gynecologie_list' %}active{% endif %}">
    Les patients
  </a>

  <a href="{% url 'gynecologie_rdv' %}"
     class="o-nav-link {% if uname == 'gynecologie_rdv' or uname == 'gynecologie_rdv_create' or uname == 'gynecologie_rdv_detail' %}active{% endif %}">
    Rendez-vous
  </a>

  <a href="{% url 'gynecologie_naissances' %}"
     class="o-nav-link {% if uname == 'gynecologie_naissances' or uname == 'gynecologie_naissance_create' %}active{% endif %}">
    Registre des naissances
  </a>
</nav>
{% endwith %}
