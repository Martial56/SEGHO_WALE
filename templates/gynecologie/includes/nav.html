{% with uname=request.resolver_match.url_name %}
<nav class="o-nav">
  <a href="{% url 'dashboard' %}" class="o-nav-grid" title="Accueil">
    <i class="bi bi-grid-3x3-gap-fill"></i>
  </a>
  <span class="o-nav-brand">
    <i class="bi bi-gender-female"></i>
    Gynécologie
  </span>

  <a href="{% url 'gynecologie_list' %}"
     class="o-nav-link {% if uname == 'gynecologie_list' %}active{% endif %}">
    Les patients
  </a>

  <a href="{% url 'gynecologie_rdv' %}"
     class="o-nav-link {% if uname == 'gynecologie_rdv' or uname == 'gynecologie_rdv_create' or uname == 'gynecologie_rdv_detail' %}active{% endif %}">
    Rendez-vous
  </a>

  <a href="{% url 'gynecologie_naissances' %}"
     class="o-nav-link {% if uname == 'gynecologie_naissances' or uname == 'gynecologie_naissance_create' %}active{% endif %}">
    Registre des naissances
  </a>

  <div class="o-nav-dd">
    <span class="o-nav-link o-nav-dd-trigger {% if uname == 'gynecologie_typevisite_list' or uname == 'gynecologie_typevisite_create' or uname == 'gynecologie_typevisite_edit' %}active{% endif %}">
      Configurations <i class="bi bi-chevron-down" style="font-size:9px;margin-left:2px;"></i>
    </span>
    <div class="o-nav-dd-panel">
      <a href="{% url 'gynecologie_typevisite_list' %}"
         class="o-nav-dd-item {% if uname == 'gynecologie_typevisite_list' or uname == 'gynecologie_typevisite_create' or uname == 'gynecologie_typevisite_edit' %}active{% endif %}">
        <i class="bi bi-card-list"></i> Type de visite
      </a>
    </div>
  </div>
</nav>
{% endwith %}
