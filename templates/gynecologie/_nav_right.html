{% load i18n %}
<div class="o-nav-right">

  <!-- Messagerie -->
  <button class="o-nav-icon" title="Messagerie">
    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/>
    </svg>
  </button>

  <!-- Notifications -->
  <button class="o-nav-icon" title="Notifications">
    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/>
      <path d="M13.73 21a2 2 0 0 1-3.46 0"/>
    </svg>
  </button>

  <!-- Thème -->
  <button class="o-nav-icon" id="gyn-theme-toggle" title="Thème sombre / clair">
    <svg class="icon-sun" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <circle cx="12" cy="12" r="5"/>
      <line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/>
      <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/>
      <line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/>
      <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/>
    </svg>
    <svg class="icon-moon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
    </svg>
  </button>

  <!-- Horloge -->
  <div class="o-nav-clock">
    <span class="o-nav-time" id="gyn-live-time">--:--</span>
    <span>{% now "d/m/Y" %}</span>
  </div>

  <!-- Utilisateur -->
  <div class="o-nav-user">
    <div class="o-nav-avatar">{{ user.username|first|upper }}</div>
    <div>
      <div class="o-nav-uname">{{ user.get_full_name|default:user.username }}</div>
      <div class="o-nav-urole">{% if user.is_superuser %}Administrateur{% else %}Utilisateur{% endif %}</div>
    </div>
  </div>

  <!-- Déconnexion -->
  <button type="button" class="o-nav-logout" title="Déconnexion" data-logout-url="{% url 'logout' %}" onclick="(function(btn){var f=document.createElement('form');f.method='post';f.action=btn.dataset.logoutUrl;var m=document.cookie.match(/csrftoken=([^;]+)/);var t=m?m[1]:'';var i=document.createElement('input');i.type='hidden';i.name='csrfmiddlewaretoken';i.value=t;f.appendChild(i);document.body.appendChild(f);f.submit();})(this)">
    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/>
      <polyline points="16 17 21 12 16 7"/>
      <line x1="21" y1="12" x2="9" y2="12"/>
    </svg>
  </button>

</div>
