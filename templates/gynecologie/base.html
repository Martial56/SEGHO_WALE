{% extends 'base.html' %}
{% load i18n %}
{% block topbar_title %}Gynécologie{% endblock %}

{% block extra_css %}
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
<style>
:root { --surface:#fff; --border:#e8edf2; --text:#0d3040; --text-muted:rgba(0,0,0,.45); }
html[data-theme="dark"] { --surface:#132033; --border:#243044; --text:#d4e6f5; --text-muted:rgba(255,255,255,.45); }
{% block extra_gyn_css %}{% endblock %}
</style>
{% endblock %}

{% block module_navbar %}

  </a>
  <span class="o-nav-brand">
    <i class="bi bi-heart-pulse-fill"></i>
    Gynécologie
  </span>
  <a href="{% url 'gynecologie_list' %}" class="o-nav-link {% block nav_patients %}{% endblock %}">Les patients</a>
  <a href="{% url 'gynecologie_rdv' %}"  class="o-nav-link {% block nav_rdv %}{% endblock %}">Rendez-vous</a>
  <a href="{% url 'gynecologie_naissances' %}" class="o-nav-link {% block nav_naissances %}{% endblock %}">Registre des naissances</a>

</nav>
{% endblock %}
